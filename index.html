。", "age": "9ヵ月", "cite": "", "note": "対象年齢・条件：9ヵ月。動画内にも表示してください。\n受診・相談の目安：水だけでなくミルクや母乳でも生後まもなくからせき込むことが多かったのなら、生まれつき飲み込む機能が不十分な病気の可能性があり、小児科や耳鼻科で相談するとよいでしょう。"}, {"no": 90, "cat": "アレルギー・皮膚", "q": "水いぼができました。注意点を教えてください。", "hook": "結論から言うと、水いぼ（伝染性軟属腫）の注意点： ①治るまでに時間がかかる（個人差があるが6ヵ月〜2年程度） ②乳児やアトピー性皮膚炎の患者さんにできやすい ③プールは基本的…", "point1": "水いぼ（伝染性軟属腫）の注意点：", "point2": "①治るまでに時間がかかる（個人差があるが6ヵ月〜2年程度）", "jusin": "治療については「取るべきか待つべきか」で意見が分かれるため、かかりつけ医と相談しながら方針を決めましょう。", "answer": "水いぼ（伝染性軟属腫）の注意点：\n\n①治るまでに時間がかかる（個人差があるが6ヵ月〜2年程度）\n\n②乳児やアトピー性皮膚炎の患者さんにできやすい\n\n③プールは基本的に可能（ビート板の共有は避ける）\n\n予防：皮膚のバリア機能を高めることが重要。アトピーやドライスキンはしっかり保湿治療を続ける。治療については「取るべきか待つべきか」で意見が分かれるため、かかりつけ医と相談しながら方針を決めましょう。", "age": "11ヵ月", "cite": "", "note": "対象年齢・条件：11ヵ月。動画内にも表示してください。\n受診・相談の目安：治療については「取るべきか待つべきか」で意見が分かれるため、かかりつけ医と相談しながら方針を決めましょう。"}, {"no": 91, "cat": "感染症", "q": "1歳以上なら咳にはちみつが効くと聞きましたが本当ですか？", "hook": "結論から言うと、1歳以上を対象とした研究では、はちみつは上気道感染症（風邪の咳）の症状緩和に効果がある可能性が示されています。", "point1": "1歳以上を対象とした研究では、はちみつは上気道感染症（風邪の咳）の症状緩和に効果がある可能性が示されています。", "point2": "ただし1歳未満には絶対に与えないこと（乳児ボツリヌス症のリスク）。1歳以上ならスプーン1杯程度を試してみても問題ありません。", "jusin": "", "answer": "1歳以上を対象とした研究では、はちみつは上気道感染症（風邪の咳）の症状緩和に効果がある可能性が示されています。2021年のシステマティックレビューでは、はちみつはプラセボと比べて咳の頻度・重症度・睡眠への影響を改善する可能性があると報告されています。\n\nただし1歳未満には絶対に与えないこと（乳児ボツリヌス症のリスク）。1歳以上ならスプーン1杯程度を試してみても問題ありません。", "age": "全般", "cite": "Abuelgasim H, et al. BMJ Evid Based Med. 2021;26(2):57-64.", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 92, "cat": "生活・からだ", "q": "赤ちゃんの薄毛・脱毛について教えてください。将来的な薄毛と関係しますか？", "hook": "結論から言うと、新生児の髪の毛は通常生後数ヵ月以内に抜け落ちます（抜け毛のピークは生後3〜4ヵ月）。", "point1": "新生児の髪の毛は通常生後数ヵ月以内に抜け落ちます（抜け毛のピークは生後3〜4ヵ月）。これはホルモンの影響による正常な反応で、抜けた部分は永久毛に置き換わります。", "point2": "乳児期の薄毛と将来の薄毛（成人型脱毛症）は基本的に関係ありません。", "jusin": "", "answer": "新生児の髪の毛は通常生後数ヵ月以内に抜け落ちます（抜け毛のピークは生後3〜4ヵ月）。これはホルモンの影響による正常な反応で、抜けた部分は永久毛に置き換わります。また生後3〜6ヵ月の乳児は、あおむけにしている間に後頭部の髪の毛をこすって摩擦性脱毛が起こることがあります。お座りができるようになると再び生えてきます。\n\n乳児期の薄毛と将来の薄毛（成人型脱毛症）は基本的に関係ありません。", "age": "3ヵ月", "cite": "", "note": "対象年齢・条件：3ヵ月。動画内にも表示してください。"}, {"no": 93, "cat": "感染症", "q": "帰宅後に足の裏を拭くと感染症予防になると聞きますが本当ですか？", "hook": "結論から言うと、これは間違いです。", "point1": "これは間違いです。足の裏を拭いても感染症予防にはなりません。手洗いが有効な理由は、手で鼻・口・食べ物などを触ることで口の中に病原体が取り込まれるためです。", "point2": "感染症予防として有効なのは：手洗い・マスク・アルコール消毒・予防接種です。", "jusin": "", "answer": "これは間違いです。足の裏を拭いても感染症予防にはなりません。手洗いが有効な理由は、手で鼻・口・食べ物などを触ることで口の中に病原体が取り込まれるためです。足の裏から感染症の病原体が体内に入り込む経路は通常ありません。\n\n感染症予防として有効なのは：手洗い・マスク・アルコール消毒・予防接種です。", "age": "3ヵ月", "cite": "", "note": "対象年齢・条件：3ヵ月。動画内にも表示してください。"}, {"no": 94, "cat": "睡眠", "q": "「スリーパーはよくない」と言われましたが、使っていいですか？", "hook": "結論から言うと、アメリカ小児科学会は、乳児を硬くて平らな寝具に寝かせることを推奨しています。", "point1": "アメリカ小児科学会は、乳児を硬くて平らな寝具に寝かせることを推奨しています。スリーパーの使用については議論がありますが、日本小児科学会は柔らかい寝具よりはよいかもしれないという案を提示しています。", "point2": "アメリカ小児科学会は、乳児を硬くて平らな寝具に寝かせることを推奨しています。スリーパーの使用については議論がありますが、日本小児科学会は柔らかい寝具よりはよいかもしれないという案を提示しています。", "jusin": "", "answer": "アメリカ小児科学会は、乳児を硬くて平らな寝具に寝かせることを推奨しています。スリーパーの使用については議論がありますが、日本小児科学会は柔らかい寝具よりはよいかもしれないという案を提示しています。", "age": "全般", "cite": "https://www.jpeds.or.jp/modules/guidelines/index.php?content_id=160", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 95, "cat": "口・歯", "q": "「指しゃぶりは親の愛情が乏しいから」というのは本当ですか？", "hook": "結論から言うと、指しゃぶりやおしゃぶりを長く続けていると、前歯が前に出たり、口を閉じても上下の前歯の間にすきまができたりと、歯並びやかみ合わせへの影響や、口呼吸・舌足らずな発…", "point1": "指しゃぶりやおしゃぶりを長く続けていると、前歯が前に出たり、口を閉じても上下の前歯の間にすきまができたりと、歯並びやかみ合わせへの影響や、口呼吸・舌足らずな発音などにつながる心配はあります。", "point2": "指しゃぶりをする割合は、１歳半で30%、3歳で20%、5歳で10%というデータがあり、年齢とともに自然と減っていくことがわかっています。指しゃぶりは3歳までは様子を見て、4〜5歳になっても続くようなら、小児科や小児歯科などでご相談ください。", "jusin": "指しゃぶりは3歳までは様子を見て、4〜5歳になっても続くようなら、小児科や小児歯科などでご相談ください。", "answer": "指しゃぶりやおしゃぶりを長く続けていると、前歯が前に出たり、口を閉じても上下の前歯の間にすきまができたりと、歯並びやかみ合わせへの影響や、口呼吸・舌足らずな発音などにつながる心配はあります。とはいえ、あわててやめさせようとしなくても大丈夫です。\n\n指しゃぶりをする割合は、１歳半で30%、3歳で20%、5歳で10%というデータがあり、年齢とともに自然と減っていくことがわかっています。指しゃぶりは3歳までは様子を見て、4〜5歳になっても続くようなら、小児科や小児歯科などでご相談ください。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。\n受診・相談の目安：指しゃぶりは3歳までは様子を見て、4〜5歳になっても続くようなら、小児科や小児歯科などでご相談ください。"}, {"no": 96, "cat": "感染症", "q": "「お風呂は午後に入ったほうがいい」というのは本当ですか？", "hook": "結論から言うと、「指しゃぶりは親の愛情不足が原因」という説には医学的根拠がありません。", "point1": "「指しゃぶりは親の愛情不足が原因」という説には医学的根拠がありません。指しゃぶりは発達の正常な一部で、赤ちゃんの多くに見られます。", "point2": "指しゃぶりの行動は一般的に不安や緊張を取り落ち着くための「自己鎮静行動」と考えられており、研究では指しゃぶりで口が刺激されると筋肉のバランスや姿勢が調整され精神的な緊張をほぐす役割があることが報告されています。", "jusin": "4〜5歳を超えても続く場合は小児科や小児歯科に相談してください。", "answer": "「指しゃぶりは親の愛情不足が原因」という説には医学的根拠がありません。指しゃぶりは発達の正常な一部で、赤ちゃんの多くに見られます。生後6か月時点では約半数に見られ、つかまり立ちや一人歩きの発達過程で自然に減っていき、3歳では1〜2割にまで減少します。\n\n指しゃぶりの行動は一般的に不安や緊張を取り落ち着くための「自己鎮静行動」と考えられており、研究では指しゃぶりで口が刺激されると筋肉のバランスや姿勢が調整され精神的な緊張をほぐす役割があることが報告されています。また、日本の双子研究では指しゃぶりに遺伝的な要因があること（男性の66%、女性の50%）も指摘されており、「親の愛情不足が原因」という説明には根拠がありません。\n\n一方、デメリットとして指しゃぶりを長く続けていると歯並びへの影響（出っ歯・開咬）が生じる可能性があります。また年長児では爪周囲炎など感染症のリスクが指摘されています。\n\n基本的に3歳までは見守りで大丈夫です。4〜5歳を超えても続く場合は小児科や小児歯科に相談してください。無理にやめさせようとしたり叱ったりしても効果はなく、「やめようという気持ちを育む」こと（指しゃぶりしなかった日をカレンダーで褒める、手を忙しくさせるなど）が有効です。", "age": "全般", "cite": "Orimadegun AE, et al. Frontiers in Pediatrics. 2015.\nLarsson E, et al. Scand J Dent Res. 1992;100(5):292-5.\nOoki S. Twin Res Hum Genet. 2005;8(4):320-7.\n米国小児科学会ウェブサイト. Pacifiers and Thumb Sucking.", "note": "対象年齢・条件：全般。動画内にも表示してください。\n受診・相談の目安：4〜5歳を超えても続く場合は小児科や小児歯科に相談してください。"}, {"no": 97, "cat": "睡眠", "q": "「布団をかけないまま朝まで寝ています」赤ちゃんは寒さを感じないのですか？", "hook": "結論から言うと、重いふとん・温めすぎは、SIDSのリスクを高める可能性があります。", "point1": "重いふとん・温めすぎは、SIDSのリスクを高める可能性があります。", "point2": "睡眠中に赤ちゃんが死亡する「乳幼児突然死症候群（SIDS）」という病気があります。SIDSを引き起こす要因はさまざまで、まだよくわかっていないことも多いのですが、「温めすぎ」「重いふとん」は、SIDS発症との関与が指摘されています。", "jusin": "", "answer": "重いふとん・温めすぎは、SIDSのリスクを高める可能性があります。\n\n睡眠中に赤ちゃんが死亡する「乳幼児突然死症候群（SIDS）」という病気があります。SIDSを引き起こす要因はさまざまで、まだよくわかっていないことも多いのですが、「温めすぎ」「重いふとん」は、SIDS発症との関与が指摘されています。かけぶとんは軽いものを使い、室温と赤ちゃんのようすにあわせて調節しましょう。", "age": "3ヵ月", "cite": "", "note": "対象年齢・条件：3ヵ月。動画内にも表示してください。"}, {"no": 98, "cat": "感染症", "q": "「よく風邪をひく子は、大人になると身体が丈夫になる」は本当ですか？", "hook": "結論から言うと、就学前に風邪をよくひく子は、就学後に風邪をひきにくくなるという研究はあります。", "point1": "就学前に風邪をよくひく子は、就学後に風邪をひきにくくなるという研究はあります。", "point2": "免疫は少しずつ成熟していくものであり、自然な生活の中で病原体に接触していくことは免疫形成に必要です。", "jusin": "", "answer": "就学前に風邪をよくひく子は、就学後に風邪をひきにくくなるという研究はあります。ただし就学以降は「よく風邪をひいた子」と「あまりひかなかった子」で差がなくなるという報告もあり、「幼少期に風邪をひくほど大人になって丈夫になる」とは言い切れません。\n\n免疫は少しずつ成熟していくものであり、自然な生活の中で病原体に接触していくことは免疫形成に必要です。", "age": "5ヵ月", "cite": "", "note": "対象年齢・条件：5ヵ月。動画内にも表示してください。"}, {"no": 99, "cat": "感染症", "q": "「玉ねぎを切って枕元に置くと咳が止まる」は本当ですか？", "hook": "結論から言うと、この民間療法は古くから存在しますが、科学的に証明した信頼性の高い研究はありません。", "point1": "この民間療法は古くから存在しますが、科学的に証明した信頼性の高い研究はありません。玉ねぎの揮発成分（硫化アリル）が目・鼻・気道を刺激し、かえって症状を悪化させる可能性もあります。", "point2": "咳の対症療法として効果が認められているのは：1歳以上ならはちみつ・加湿・水分補給など。", "jusin": "", "answer": "この民間療法は古くから存在しますが、科学的に証明した信頼性の高い研究はありません。玉ねぎの揮発成分（硫化アリル）が目・鼻・気道を刺激し、かえって症状を悪化させる可能性もあります。\n\n咳の対症療法として効果が認められているのは：1歳以上ならはちみつ・加湿・水分補給など。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 100, "cat": "おなか・排便", "q": "ベビーマッサージは発達を促しますか？", "hook": "結論から言うと、親が赤ちゃんをやさしくマッサージすることは、スキンシップを通じて赤ちゃんに安心感を与え、よく眠れるようになる・便秘が改善される可能性があるとして、アメリカ小児…", "point1": "親が赤ちゃんをやさしくマッサージすることは、スキンシップを通じて赤ちゃんに安心感を与え、よく眠れるようになる・便秘が改善される可能性があるとして、アメリカ小児科学会でも紹介されています。", "point2": "特に早産児や低体重児では体重増加・発達の促進・入院期間の短縮に効果があるというエビデンスがより強いです。満期産の健康な赤ちゃんに対しては親子の絆の形成・親のストレス軽減という点で意義があります。", "jusin": "", "answer": "親が赤ちゃんをやさしくマッサージすることは、スキンシップを通じて赤ちゃんに安心感を与え、よく眠れるようになる・便秘が改善される可能性があるとして、アメリカ小児科学会でも紹介されています。\n\n特に早産児や低体重児では体重増加・発達の促進・入院期間の短縮に効果があるというエビデンスがより強いです。満期産の健康な赤ちゃんに対しては親子の絆の形成・親のストレス軽減という点で意義があります。強く押す必要はなく、普段のお世話の中で体に触れながら声をかけるだけでも十分です。", "age": "3ヵ月", "cite": "Bennett C, et al. Cochrane Database Syst Rev. 2013.", "note": "対象年齢・条件：3ヵ月。動画内にも表示してください。"}, {"no": 101, "cat": "アレルギー・皮膚", "q": "あせもの治療方法を教えてください。塩水につけると治りますか？", "hook": "結論から言うと、あせもの治療の基本は汗を洗い流して皮膚を清潔にすることです。", "point1": "あせもの治療の基本は汗を洗い流して皮膚を清潔にすることです。シャワーや入浴でこまめに汗を洗い流す・かゆみがあれば患部を冷やす・保湿剤や軟膏を塗る。かゆくてかき壊すととびひ（伝染性膿痂疹）のリスクがあります。", "point2": "塩水につけると治る：医学的根拠はありません。むしろ塩分が皮膚を刺激する可能性があるためお勧めしません。", "jusin": "改善しない場合や症状が強い場合は小児科・皮膚科に相談を。", "answer": "あせもの治療の基本は汗を洗い流して皮膚を清潔にすることです。シャワーや入浴でこまめに汗を洗い流す・かゆみがあれば患部を冷やす・保湿剤や軟膏を塗る。かゆくてかき壊すととびひ（伝染性膿痂疹）のリスクがあります。\n\n塩水につけると治る：医学的根拠はありません。むしろ塩分が皮膚を刺激する可能性があるためお勧めしません。\n\n改善しない場合や症状が強い場合は小児科・皮膚科に相談を。ステロイド外用薬でかゆみ・炎症をコントロールすることができます。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。\n受診・相談の目安：改善しない場合や症状が強い場合は小児科・皮膚科に相談を。"}, {"no": 102, "cat": "アレルギー・皮膚", "q": "「お風呂上がりに湯冷めするとカゼをひく」は本当ですか？", "hook": "結論から言うと、これは現代の住環境では当てはまらない古い考え方です。", "point1": "これは現代の住環境では当てはまらない古い考え方です。家屋内に風呂がある現代では特に気にする必要はありません。入浴のメリット（皮膚の清潔・よく眠れるようになる等）の方が大切です。", "point2": "カゼをひいているときも「飲む・眠る・遊ぶ」ができていれば短時間の入浴はOKです。", "jusin": "", "answer": "これは現代の住環境では当てはまらない古い考え方です。家屋内に風呂がある現代では特に気にする必要はありません。入浴のメリット（皮膚の清潔・よく眠れるようになる等）の方が大切です。\n\nカゼをひいているときも「飲む・眠る・遊ぶ」ができていれば短時間の入浴はOKです。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 103, "cat": "発達・成長", "q": "「小さいうちから車に乗っていると車酔いしなくなる」は本当ですか？", "hook": "結論から言うと、乳幼児（2歳以下）は車酔いをすること自体が稀です。", "point1": "乳幼児（2歳以下）は車酔いをすること自体が稀です。車酔いは6〜9歳ごろに最も多く、思春期になると減少します。", "point2": "したがって「小さいうちから車に乗ると慣れる」という考え方は、乳幼児の特性を踏まえると的外れなことが多いです。車酔いは年齢とともに自然に改善することがほとんどです。", "jusin": "", "answer": "乳幼児（2歳以下）は車酔いをすること自体が稀です。車酔いは6〜9歳ごろに最も多く、思春期になると減少します。これは空間認知機能の発達と関係しており、目から入る情報と体が感じる加速度の情報にズレが生じると起こります。\n\nしたがって「小さいうちから車に乗ると慣れる」という考え方は、乳幼児の特性を踏まえると的外れなことが多いです。車酔いは年齢とともに自然に改善することがほとんどです。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 104, "cat": "食事・栄養", "q": "「妊娠中にいろいろなものを食べると子どもも好き嫌いしない」というのは本当ですか？", "hook": "結論から言うと、妊娠中の母親の食事が生まれてくる子どもの食の好みを決めるという明確な科学的根拠はありません。", "point1": "妊娠中の母親の食事が生まれてくる子どもの食の好みを決めるという明確な科学的根拠はありません。", "point2": "子どもが新しい食べ物の味に慣れるには、無理やり食べさせるのではなく自然な形で何度も提供することが大切です。", "jusin": "", "answer": "妊娠中の母親の食事が生まれてくる子どもの食の好みを決めるという明確な科学的根拠はありません。ただし妊娠中・授乳中に多様な食品を摂取することで羊水や母乳を通して赤ちゃんがさまざまな味に触れ、離乳食への適応を助ける可能性を示す研究はあります（因果関係は未確立）。\n\n子どもが新しい食べ物の味に慣れるには、無理やり食べさせるのではなく自然な形で何度も提供することが大切です。", "age": "3ヵ月", "cite": "", "note": "対象年齢・条件：3ヵ月。動画内にも表示してください。"}, {"no": 105, "cat": "アレルギー・皮膚", "q": "屋外デビューはいつから始めてよいですか？", "hook": "結論から言うと、生後1ヶ月健診で医師から「異常なし」と言われれば、その後から外出してよいです。", "point1": "生後1ヶ月健診で医師から「異常なし」と言われれば、その後から外出してよいです。", "point2": "外気浴は皮膚や気道の感覚刺激になる、自然の光や音刺激が脳の発達に良い影響を与えるなどのメリットがあります。ただし最初は抱っこした状態でベランダや庭でほんの数分から。気温や紫外線が強い時間帯を避け、帽子で頭を保護しましょう。", "jusin": "", "answer": "生後1ヶ月健診で医師から「異常なし」と言われれば、その後から外出してよいです。\n\n外気浴は皮膚や気道の感覚刺激になる、自然の光や音刺激が脳の発達に良い影響を与えるなどのメリットがあります。ただし最初は抱っこした状態でベランダや庭でほんの数分から。気温や紫外線が強い時間帯を避け、帽子で頭を保護しましょう。生後2か月から予防接種が始まるため、生後2〜3ヶ月ごろまでは人が多く集まる場所は避けた方が安心です。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 106, "cat": "発達・成長", "q": "発汗について教えてください。赤ちゃんはどのくらい汗をかきますか？", "hook": "結論から言うと、赤ちゃんは体重当たりの体表面積が大きいため、成人に比べて体温が変化しやすいです。", "point1": "赤ちゃんは体重当たりの体表面積が大きいため、成人に比べて体温が変化しやすいです。", "point2": "発汗能力は2〜3歳ごろから徐々に大人のレベルに近づいていきます。そのため赤ちゃんは暑い環境で熱を逃しにくく、熱中症になりやすい。頭部からの発汗が多いため、頭からたくさん汗をかいていても正常です。", "jusin": "", "answer": "赤ちゃんは体重当たりの体表面積が大きいため、成人に比べて体温が変化しやすいです。汗腺の密度は大人より高い（体表面積が小さいため密度が高くなる）一方、1つ1つの汗腺の発汗能力はまだ低いため、実際に出てくる汗の量は成人よりも少ないです。\n\n発汗能力は2〜3歳ごろから徐々に大人のレベルに近づいていきます。そのため赤ちゃんは暑い環境で熱を逃しにくく、熱中症になりやすい。頭部からの発汗が多いため、頭からたくさん汗をかいていても正常です。", "age": "全般", "cite": "", "note": "対象年齢・条件：全般。動画内にも表示してください。"}, {"no": 107, "cat": "誤飲", "q": "ストローの練習方法を教えてください。", "hook": "結論から言うと、ストローで吸う動作を覚えさせるには、以下のステップが有効です： ①まずスプーンで飲む練習から始める（嚥下の基礎） ②コップ飲みが少しできるようになったら、スト…", "point1": "ストローで吸う動作を覚えさせるには、以下のステップが有効です：", "point2": "①まずスプーンで飲む練習から始める（嚥下の基礎）", "jusin": "", "answer": "ストローで吸う動作を覚えさせるには、以下のステップが有効です：\n\n①まずスプーンで飲む練習から始める（嚥下の基礎）\n\n②コップ飲みが少しできるようになったら、ストローへ\n\n③ストローを飲み物につけて、上の口を指でふさいで持ち上げ、赤ちゃんの口にそっと入れて指を放すと液体が出てくる→吸う感覚をつかませる\n\n④麦茶や薄めたジュースなど赤ちゃんが好む飲み物で練習するとやる気が出やすい\n\n飲み込む嚥下機能は生後9〜11ヵ月ごろに発達します。あせらずゆっくり練習しましょう。", "age": "7ヵ月", "cite": "", "note": "対象年齢・条件：7ヵ月。動画内にも表示してください。"}, {"no": 108, "cat": "感染症", "q": "うんちの色が心配です。どんな色のうんちが異常ですか？", "hook": "結論から言うと、緑色のうんちは心配ありません。", "point1": "緑色のうんちは心配ありません。注意が必要な色は「赤・黒・白〜灰色」の3色です。", "point2": "うんちには胆汁に排出されるビリルビンという色素が含まれており、色の変化はこの影響を受けます。またミルクに含まれる鉄分の影響で緑色になることもあります。赤ちゃんの機嫌がよく母乳やミルクをいつも通り飲めているようなら心配ありません。", "jusin": "一日も早く小児科を受診して", "answer": "緑色のうんちは心配ありません。注意が必要な色は「赤・黒・白〜灰色」の3色です。\n\nうんちには胆汁に排出されるビリルビンという色素が含まれており、色の変化はこの影響を受けます。またミルクに含まれる鉄分の影響で緑色になることもあります。赤ちゃんの機嫌がよく母乳やミルクをいつも通り飲めているようなら心配ありません。\n\n赤いうんち：まっ赤なうんち、いちごジャムのようなうんちが出て周期的に泣いたり不機嫌になるときは要注意\n黒いうんち：血便の可能性。食道や胃での出血が疑われる\n白・灰色のうんち：生後数ヵ月以内で、はじめは黄色だったうんちが薄い黄色や灰色に変化するときは、胆管が詰まって胆汁が流れなくなる病気の可能性。一日も早く小児科を受診して\n酸っぱいニオイがする白い下痢便：ウイルス性胃腸炎の可能性\n\nうんちの色に迷ったときは、スマホで撮影した写真を小児科や保健センターに見せると診断に役立ちます。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：一日も早く小児科を受診して"}, {"no": 109, "cat": "おなか・排便", "q": "1日何回排便すれば問題ないですか？", "hook": "結論から言うと、うんちの量や回数に「正解」はありません。", "point1": "うんちの量や回数に「正解」はありません。", "point2": "人の腸管には100〜1000兆個もの細菌が存在している\"未知の世界\"で、腸内細菌には個人差も大きく、「スプリンターのような速さの子もいれば、ゆっくり着実な長距離ランナーのような速さの子もいる」と表現されるほど、赤ちゃんの排便の量や回数はさまざまです。", "jusin": "便秘の受診の目安を知っていれば、それほど一喜一憂しなくて大丈夫ですよ。", "answer": "うんちの量や回数に「正解」はありません。\n\n人の腸管には100〜1000兆個もの細菌が存在している\"未知の世界\"で、腸内細菌には個人差も大きく、「スプリンターのような速さの子もいれば、ゆっくり着実な長距離ランナーのような速さの子もいる」と表現されるほど、赤ちゃんの排便の量や回数はさまざまです。\n\n便秘の受診の目安を知っていれば、それほど一喜一憂しなくて大丈夫ですよ。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：便秘の受診の目安を知っていれば、それほど一喜一憂しなくて大丈夫ですよ。"}, {"no": 110, "cat": "おなか・排便", "q": "食べたものがそのままの形で出てきます。大丈夫ですか？", "hook": "結論から言うと、腸内環境の変化による影響です。", "point1": "腸内環境の変化による影響です。離乳食はそのまま続けていいでしょう。", "point2": "母乳・ミルクから離乳食へ変わったり、月齢が進んで離乳食のかたさが変わったりして腸内の環境が変化したことによる影響なので、離乳食はそのまま続けていてOKです。", "jusin": "気がかりなときは小児科でご相談ください。", "answer": "腸内環境の変化による影響です。離乳食はそのまま続けていいでしょう。\n\n母乳・ミルクから離乳食へ変わったり、月齢が進んで離乳食のかたさが変わったりして腸内の環境が変化したことによる影響なので、離乳食はそのまま続けていてOKです。\n\n栄養がとれていないのではと心配になるかもしれませんが、基本的に体重が順調に増えていれば、栄養不足の心配はないでしょう。気がかりなときは小児科でご相談ください。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：気がかりなときは小児科でご相談ください。"}, {"no": 111, "cat": "おなか・排便", "q": "便秘の基準は何日出なかったらですか？", "hook": "結論から言うと、一般的に、3日以上出ない場合を便秘と考えます。", "point1": "一般的に、3日以上出ない場合を便秘と考えます。ただ、毎日排便があっても次のような症状があるときは便秘の可能性があります。", "point2": "【便秘かも？チェックリスト（1つでもあてはまるときは受診を）】", "jusin": "チェックリスト（1つでもあてはまるときは受診を）】", "answer": "一般的に、3日以上出ない場合を便秘と考えます。ただ、毎日排便があっても次のような症状があるときは便秘の可能性があります。\n\n【便秘かも？チェックリスト（1つでもあてはまるときは受診を）】\n\nうんちがかたくて出すときに苦しそう\n排便するときに出血している\n1週間以上のガンコな便秘を繰り返す\n食欲がなく食事量が減っている、母乳・ミルクの飲みが悪い\n腹痛や嘔吐などの症状もある\n\n生後数ヵ月以内は、便を体外に押し出す力が弱く、踏んばり方も上手ではないため便が出にくいことがあります。排便回数が少なくても出てきた便がやわらかいようなら、成長とともに自然と改善することが多いです。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：チェックリスト（1つでもあてはまるときは受診を）】"}, {"no": 112, "cat": "アレルギー・皮膚", "q": "便秘対策に綿棒浣腸を教えてください。やりすぎると自発的な排便に影響しますか？", "hook": "結論から言うと、3日排便がないようなら綿棒浣腸をやってみてもいいでしょう。", "point1": "3日排便がないようなら綿棒浣腸をやってみてもいいでしょう。綿棒浣腸がクセになるという医学的な根拠はありません。むしろ便秘がクセになることのほうが心配です。", "point2": "【綿棒浣腸のやり方】", "jusin": "出ない場合は、無理せず小児科で相談を ガンコな便秘の中には先天性の病気が隠れていることもあるため、便秘が続くときや排便時に苦しそうな様子があるときは早めに小児科を受診してください。", "answer": "3日排便がないようなら綿棒浣腸をやってみてもいいでしょう。綿棒浣腸がクセになるという医学的な根拠はありません。むしろ便秘がクセになることのほうが心配です。\n\n【綿棒浣腸のやり方】\n\n新聞紙やオムツを下に敷き、おしりをしっかりつける（おしりが浮いていると不安定で危険）\nオイルやワセリンなどを塗った綿棒を、やや背中側に向けるようにして、綿棒の綿部分が隠れるくらい（1cm程度）まで肛門に入れ、ゆっくりまわす\n出ない場合は、無理せず小児科で相談を\n\nなお、自己判断で市販の浣腸を使うのは避けましょう。浣腸はやりすぎると自力で排便しにくくなるという専門家の意見もあります。ガンコな便秘の中には先天性の病気が隠れていることもあるため、便秘が続くときや排便時に苦しそうな様子があるときは早めに小児科を受診してください。\n\n【エビデンスのある便秘対策】\n\n食物繊維（ほうれんそう・にんじん・かぼちゃなどの緑黄色野菜、さつまいも・じゃがいもなどのいも類、わかめや寒天など）\nヨーグルトは効果がはっきりしていないが、月齢に応じて本人が好んで食べるなら食べさせてOK\n\nなお、サプリメント・おしりのツボ・太ももの体操・砂糖水・経口補水液が便秘に効くという医学的根拠はありません。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：出ない場合は、無理せず小児科で相談を ガンコな便秘の中には先天性の病気が隠れていることもあるため、便秘が続くときや排便時に苦しそうな様子があるときは早めに小児科を受診してください。"}, {"no": 113, "cat": "アレルギー・皮膚", "q": "下痢と普通のうんちの違いがわかりません。どう見分ければいいですか？", "hook": "結論から言うと、「いつもよりゆるく、水っぽいと感じるとき」が下痢です。", "point1": "「いつもよりゆるく、水っぽいと感じるとき」が下痢です。普段との違いで判断しましょう。", "point2": "赤ちゃんのうんちはゆるいことが多いものですが、「いつもより水っぽい」と感じるときは下痢と考えてOKです。下痢といえば胃腸炎のイメージが強いですが、抗菌薬の副反応や乳児消化管アレルギー、消化器系の病気など、それ以外の場合も考えられます。", "jusin": "嘔吐など下痢以外の症状がなく、機嫌よく母乳やミルクをいつも通り飲めているなら様子をみていて大丈夫ですが、下痢が2週間以上続くときは診察時間内に受診しましょう。 体重が順調に増えていれば心配ありませんが、気がかりなときはかかりつけ医にご相談ください。", "answer": "「いつもよりゆるく、水っぽいと感じるとき」が下痢です。普段との違いで判断しましょう。\n\n赤ちゃんのうんちはゆるいことが多いものですが、「いつもより水っぽい」と感じるときは下痢と考えてOKです。下痢といえば胃腸炎のイメージが強いですが、抗菌薬の副反応や乳児消化管アレルギー、消化器系の病気など、それ以外の場合も考えられます。\n\n嘔吐など下痢以外の症状がなく、機嫌よく母乳やミルクをいつも通り飲めているなら様子をみていて大丈夫ですが、下痢が2週間以上続くときは診察時間内に受診しましょう。\n\n離乳食を始めると便秘になる子もいれば、うんちがゆるくなる子もいます。食べたものがそのまま出てくることがありますが、これは腸内環境の変化による影響なので離乳食はそのまま続けて問題ありません。体重が順調に増えていれば心配ありませんが、気がかりなときはかかりつけ医にご相談ください。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：嘔吐など下痢以外の症状がなく、機嫌よく母乳やミルクをいつも通り飲めているなら様子をみていて大丈夫ですが、下痢が2週間以上続くときは診察時間内に受診しましょう。 体重が順調に増えていれば心配ありませんが、気がかりなときはかかりつけ医にご相談ください。"}, {"no": 114, "cat": "けが・事故", "q": "頭をぶつけたあと、どんな様子のときに受診が必要ですか？", "hook": "結論から言うと、ぶつけた直後は症状が出にくい場合もあるので、24時間は様子をよく観察しましょう。", "point1": "ぶつけた直後は症状が出にくい場合もあるので、24時間は様子をよく観察しましょう。たんこぶや1回の嘔吐は、元気なら大あわてで受診しなくて大丈夫です。", "point2": "【救急車を呼ぶ】", "jusin": "たんこぶや1回の嘔吐は、元気なら大あわてで受診しなくて大丈夫です。 【救急車を呼ぶ】 【時間外でもすぐに受診】", "answer": "ぶつけた直後は症状が出にくい場合もあるので、24時間は様子をよく観察しましょう。たんこぶや1回の嘔吐は、元気なら大あわてで受診しなくて大丈夫です。\n\n【救急車を呼ぶ】\n\n意識の状態が悪い（眠っているかわからないときは起こして確認を）\nぐったりして泣かない\nけいれんしている\n意識はあるが左右の手足の動きが違う\n\n【時間外でもすぐに受診】\n\n繰り返し嘔吐する\n不機嫌でぐずり方が激しい\n普段寝る時間帯ではないのによく眠る、眠けが強い\n「たんこぶ」「嘔吐」「機嫌が悪い」のうち2つ以上の症状がある\n歩行が不安定など普段と違う様子がある\n\n【ホームケア】\n\nぶつけた場所に傷がないかを確認する\n出血していたら、傷口を清潔なタオルなどで押さえて止血する。傷がなければタオルで包んだ保冷剤で冷やす\n長時間の外出は避け、家でゆっくり過ごす\n\n2歳未満では高さ90cm以上、2歳以降は1.5m以上から落ちると重大なケガを負う恐れがあります。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：たんこぶや1回の嘔吐は、元気なら大あわてで受診しなくて大丈夫です。 【救急車を呼ぶ】 【時間外でもすぐに受診】"}, {"no": 115, "cat": "誤飲", "q": "飲み込むと特に危険なものを教えてください。？", "hook": "結論から言うと、誤飲は生後5か月ごろから増え、特に生後6ヵ月から2歳までの男の子に多いとされています。", "point1": "誤飲は生後5か月ごろから増え、特に生後6ヵ月から2歳までの男の子に多いとされています。", "point2": "【飲み込むと特に危険なもの】", "jusin": "", "answer": "誤飲は生後5か月ごろから増え、特に生後6ヵ月から2歳までの男の子に多いとされています。\n\n【飲み込むと特に危険なもの】\n\n磁石：特に磁力の強いネオジム磁石は、複数個飲み込むと食道や胃などの粘膜を挟んで壊死させることがある\nボタン電池：赤ちゃん自身が玩具や体温計のふたを開けて取り出すケースも。飲み込むと多くは全身麻酔での処置が必要\n大人の薬：血圧・糖尿病・抗うつ薬など、1錠で重い症状につながるものも。1歳前後の子どもは薬のシートから錠剤を取り出すことも可能\nタバコ・加熱式タバコ：誤飲時の致死量は紙タバコ1本分。加熱式タバコのスティック・カプセルは小さいため誤飲リスクが高い\nジェルボール型洗剤：お菓子に似てカラフルで、普通の洗剤より高濃度のため嘔吐などの症状が出やすい\n\n【予防策】\n\n危険なもの・トイレットペーパーの芯より小さなもの（直径約4cm）は高さ1メートル以上に置く\n3歳以下は特に注意（3歳の子どもの口の大きさは約39mm）\nリモコンのふたが開かないようにテープで固定するなど、具体的対策を\n\n【NG！】誤飲を見かけても大声で注意しないで。驚いて飲み込むことがあるので、あわてずにゆっくり近寄り、そっと口から出してください。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 116, "cat": "けが・事故", "q": "SIDS（乳幼児突然死症候群）との関係も教えてください。？", "hook": "結論から言うと、0歳児の不慮の事故死の約8割が窒息死で、中でも最も多いのが「ベッド内での窒息」です。", "point1": "0歳児の不慮の事故死の約8割が窒息死で、中でも最も多いのが「ベッド内での窒息」です。", "point2": "【窒息事故の予防策】", "jusin": "", "answer": "0歳児の不慮の事故死の約8割が窒息死で、中でも最も多いのが「ベッド内での窒息」です。\n\n【窒息事故の予防策】\n\n赤ちゃんの顔のまわりにはものを置かない（ぬいぐるみ、まくら、クッション、タオルなど）\n眠るときはスタイをはずす\nできるだけベビーベッドを利用し、ふとんの場合は大人と子どものふとんを別々にする\n赤ちゃんにはベビー専用の寝具を使う\n幼児用ベッドガードは1歳半まで使用しない\n1歳までは、寝かせるときはあお向けにする\n\n【SIDS（乳幼児突然死症候群）について】\n\n現在わかっているSIDSのリスク因子の一つが「うつぶせ寝」です。寝返りしないようにずっと見張っている必要はありませんが、1歳になるまでは可能な範囲で気づいたときにあお向けに戻しましょう。\n\nなお、寝返り防止クッションはリスクが高いため使用は避けてください。ベビーモニターのセンサーシステムがSIDSの予防になるという大規模研究でのエビデンスも示されていないため、米国小児科学会はモニタリングデバイスを推奨していません。", "age": "0〜1歳", "cite": "", "note": "対象年齢・条件：0〜1歳。動画内にも表示してください。"}, {"no": 117, "cat": "けが・事故", "q": "お風呂での溺水事故を防ぐにはどうすればいいですか？", "hook": "結論から言うと、溺水事故は1〜3歳の乳幼児に多く、2歳以下の子どもが溺れる場所で最も多いのが「家のお風呂」です。", "point1": "溺水事故は1〜3歳の乳幼児に多く、2歳以下の子どもが溺れる場所で最も多いのが「家のお風呂」です。赤ちゃんはからだを思い通りに動かしにくいので、水深数センチの浅さでも溺れる危険があります。", "point2": "溺れるときは、バシャバシャと大きな音がする、騒ぎ声がすると思いがちですが、人は溺れるとき、声を出す余裕もなく、静かに沈みます。「溺れるときは静か」と知ったうえで対策を。", "jusin": "", "answer": "溺水事故は1〜3歳の乳幼児に多く、2歳以下の子どもが溺れる場所で最も多いのが「家のお風呂」です。赤ちゃんはからだを思い通りに動かしにくいので、水深数センチの浅さでも溺れる危険があります。\n\n溺れるときは、バシャバシャと大きな音がする、騒ぎ声がすると思いがちですが、人は溺れるとき、声を出す余裕もなく、静かに沈みます。「溺れるときは静か」と知ったうえで対策を。\n\n【お風呂の事故を予防するには？】\n\n大人の洗髪時は、子どもを湯船から出す\n湯船には、大人が先に入り、子どもから先に出る\n浴槽には残り湯を溜めない\n赤ちゃん用浮き輪は使わない（ひっくり返って溺水した事故が起きているため）\n浴室のドアに鍵をつける、柵を設けるなどして子どもが浴室に入れないようにする", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 118, "cat": "感染症", "q": "「血液型がB型だとノロウイルスに感染しにくい」と聞きましたが本当ですか？", "hook": "結論から言うと、ノロウイルスの感染とABO血液型の関連について調べた研究はいくつかあります。", "point1": "ノロウイルスの感染とABO血液型の関連について調べた研究はいくつかあります。一部の研究では、B型の血液型の人はノロウイルスに感染しにくいと報告しています[5]。", "point2": "ノロウイルスの感染とABO血液型の関連について調べた研究はいくつかあります。一部の研究では、B型の血液型の人はノロウイルスに感染しにくいと報告しています[5]。", "jusin": "", "answer": "ノロウイルスの感染とABO血液型の関連について調べた研究はいくつかあります。一部の研究では、B型の血液型の人はノロウイルスに感染しにくいと報告しています[5]。ただ、多くの研究がなされた結果、現在ではA型、B型、AB型はノロウイルス感染のリスクと関連はないと結論付けられています[6]。一方で、むしろO型の人は他の血液型の人よりノロウイルス感染症にかかりやすい傾向も分かってきました。したがって、「ノロウイルス感染症にB型がかかりにくいわけではなく、O型はかかりやすい」というのが回答になります。", "age": "全月齢", "cite": "[5] Hutson AM, Atmar RL, Graham DY, Estes MK. Norwalk virus infection and disease is associated with ABO histo-blood group type. J Infect Dis. 2002;185(9):1335-7.\n[6] Liao Y, Xue L, Gao J, Wu A, Kou X. ABO blood group-associated susceptibility to norovirus infection: A systematic review and meta-analysis. Infect Genet Evol. 2020;81:104245.", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 119, "cat": "感染症", "q": "せきや鼻水が出るとき、お風呂に入れていいですか？", "hook": "結論から言うと、「飲む・眠る・遊ぶ」がいつも通りできているなら、短時間のシャワー浴や入浴をしてもいいですよ。", "point1": "「飲む・眠る・遊ぶ」がいつも通りできているなら、短時間のシャワー浴や入浴をしてもいいですよ。", "point2": "湿度の高い環境に身をおくことで、気道が潤ってせきが鎮まることがあります。また、鼻の通り道が加湿されると固まった鼻水も出やすくなりますよ。", "jusin": "", "answer": "「飲む・眠る・遊ぶ」がいつも通りできているなら、短時間のシャワー浴や入浴をしてもいいですよ。\n\n湿度の高い環境に身をおくことで、気道が潤ってせきが鎮まることがあります。また、鼻の通り道が加湿されると固まった鼻水も出やすくなりますよ。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 120, "cat": "感染症", "q": "鼻吸い器を使っていますが赤ちゃんが嫌がります。コツはありますか？", "hook": "結論から言うと、鼻水がなかなか出ないときは、ベビー用の生理食塩水点鼻スプレーを試してみてもいいでしょう。", "point1": "鼻水がなかなか出ないときは、ベビー用の生理食塩水点鼻スプレーを試してみてもいいでしょう。生理食塩水の点鼻や鼻洗浄によって、鼻詰まりなどのカゼ症状を多少改善できる可能性があります。", "point2": "ただ、鼻吸いを嫌がって長時間泣き続けると、かえって鼻水が増えることもあります。激しく嫌がるときは、無理せず病院で吸ってもらいましょう。", "jusin": "", "answer": "鼻水がなかなか出ないときは、ベビー用の生理食塩水点鼻スプレーを試してみてもいいでしょう。生理食塩水の点鼻や鼻洗浄によって、鼻詰まりなどのカゼ症状を多少改善できる可能性があります。\n\nただ、鼻吸いを嫌がって長時間泣き続けると、かえって鼻水が増えることもあります。激しく嫌がるときは、無理せず病院で吸ってもらいましょう。", "age": "全月齢", "cite": "★11月号レジュメ", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 121, "cat": "感染症", "q": "SNSで「指に絆創膏を巻くと咳が緩和される」「足の裏にヴィックスベポラップを塗ると鼻水が落ち着く」と…", "hook": "結論から言うと、絆創膏を指に巻く方法は、ホクナリンテープをはがれにくいよう絆創膏で固定するケースが背景にあります。", "point1": "絆創膏を指に巻く方法は、ホクナリンテープをはがれにくいよう絆創膏で固定するケースが背景にあります。ただし、ホクナリンテープは喘息の喘鳴に対する治療薬であり、咳そのものへの効果があるわけではありません。", "point2": "ヴィックスベポラップ（ヴェポラップ）に含まれるメントールについては、上気道から吸入すると咳を抑えられたという動物実験はありますが、足の裏からの皮膚吸収で効果があるという根拠はなく、積極的に推奨できるレベルではありません。", "jusin": "", "answer": "絆創膏を指に巻く方法は、ホクナリンテープをはがれにくいよう絆創膏で固定するケースが背景にあります。ただし、ホクナリンテープは喘息の喘鳴に対する治療薬であり、咳そのものへの効果があるわけではありません。「絆創膏にアルミホイルを付けて中指に巻くと咳が止まる」という情報もありますが、明確な医学的根拠はありません。\n\nヴィックスベポラップ（ヴェポラップ）に含まれるメントールについては、上気道から吸入すると咳を抑えられたという動物実験はありますが、足の裏からの皮膚吸収で効果があるという根拠はなく、積極的に推奨できるレベルではありません。\n\n医学的に効果が証明されているのは、①温かい湯気の吸入（加湿）②温かい飲み物③室内の加湿④ハチミツ（ただし1歳未満は不可）です。", "age": "全月齢", "cite": "★11月号レジュメ", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 122, "cat": "感染症", "q": "カゼには抗生剤・抗菌薬が効きますか？", "hook": "結論から言うと、カゼの多くはウイルス感染症です。", "point1": "カゼの多くはウイルス感染症です。抗生物質や抗生剤などの抗菌薬はウイルスに効果がなく、カゼ症状を改善する効果はありません。むしろ薬が効かない「耐性菌」を増やしてしまい、症状が長引くことにもつながります。", "point2": "カゼのとき小児科ではせき・鼻水などの症状を緩和する薬や解熱剤を処方することがありますが、これらは症状をやわらげるだけで病気を根本的に治すわけではなく、薬を早く飲み始めたからといって早く治るわけではありません。", "jusin": "", "answer": "カゼの多くはウイルス感染症です。抗生物質や抗生剤などの抗菌薬はウイルスに効果がなく、カゼ症状を改善する効果はありません。むしろ薬が効かない「耐性菌」を増やしてしまい、症状が長引くことにもつながります。\n\nカゼのとき小児科ではせき・鼻水などの症状を緩和する薬や解熱剤を処方することがありますが、これらは症状をやわらげるだけで病気を根本的に治すわけではなく、薬を早く飲み始めたからといって早く治るわけではありません。\n\nカゼ症状があるときは、こまめに水分補給をしながらホームケアで安静に過ごしましょう。", "age": "全月齢", "cite": "★11月号レジュメ", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 123, "cat": "感染症", "q": "市販のカゼ薬を赤ちゃんに使ってもいいですか？", "hook": "結論から言うと、赤ちゃんには原則的に市販のカゼ薬の使用をおすすめしません。", "point1": "赤ちゃんには原則的に市販のカゼ薬の使用をおすすめしません。市販のカゼ薬には赤ちゃんにはおすすめできない成分が含まれていることがあります。", "point2": "緊急で解熱剤が必要なときは、薬局で薬剤師に相談して、服用する子どもの年齢と体重を伝えて購入しましょう。", "jusin": "緊急で解熱剤が必要なときは、薬局で薬剤師に相談して、服用する子どもの年齢と体重を伝えて購入しましょう。", "answer": "赤ちゃんには原則的に市販のカゼ薬の使用をおすすめしません。市販のカゼ薬には赤ちゃんにはおすすめできない成分が含まれていることがあります。\n\n緊急で解熱剤が必要なときは、薬局で薬剤師に相談して、服用する子どもの年齢と体重を伝えて購入しましょう。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：緊急で解熱剤が必要なときは、薬局で薬剤師に相談して、服用する子どもの年齢と体重を伝えて購入しましょう。"}, {"no": 124, "cat": "感染症", "q": "1ヵ月以上せきが続いています。よくあることですか？", "hook": "結論から言うと、風邪を引くと、その後しばらく咳が続くことがあります。", "point1": "風邪を引くと、その後しばらく咳が続くことがあります。一般的には子どもの風邪の1/4くらいは2週間程度続きます。", "point2": "風邪を引くと、その後しばらく咳が続くことがあります。一般的には子どもの風邪の1/4くらいは2週間程度続きます。", "jusin": "", "answer": "風邪を引く やわらげ、睡眠や水分をとりやすくするために行います。", "jusin": "", "answer": "残念ながら、クーリング（体を冷やすこと）や解熱剤で熱性けいれんを予防することはできません。\n\nクーリングも解熱剤の使用も、あくまで発熱による不快感をやわらげ、睡眠や水分をとりやすくするために行います。\n\nかつては発熱時に解熱剤を使用することで熱性けいれんが起きやすくなるという医師もいましたが、現在この考え方は否定されています。発熱時にけいれんを心配して解熱剤の使用を控える必要はありませんよ。", "age": "0〜5歳", "cite": "", "note": "対象年齢・条件：0〜5歳。動画内にも表示してください。"}, {"no": 130, "cat": "発熱", "q": "一度熱性けいれんになったら、発熱するたびにけいれんを繰り返しますか？", "hook": "結論から言うと、熱性けいれんを起こした子の7割は、その後の発熱でけいれんを起こすことはありません。", "point1": "熱性けいれんを起こした子の7割は、その後の発熱でけいれんを起こすことはありません。", "point2": "残りの3割の子も、短時間でおさまる「単純型」の診断なら、その後繰り返したとしても心配はなく、就学前には落ち着くことが多いです。", "jusin": "", "answer": "熱性けいれんを起こした子の7割は、その後の発熱でけいれんを起こすことはありません。\n\n残りの3割の子も、短時間でおさまる「単純型」の診断なら、その後繰り返したとしても心配はなく、就学前には落ち着くことが多いです。\n\n親やきょうだいに熱性けいれん歴があると赤ちゃんもけいれんを起こしやすい傾向があります。何度か繰り返した場合でも、原則予防薬は使用しません。\n\nけいれんが15分以上続く、24時間以内に繰り返す、左右非対称なけいれんが起こるなど「複雑型」と診断された場合は、隠れている病気がないか病院で詳しく検査します。", "age": "0〜5歳", "cite": "", "note": "対象年齢・条件：0〜5歳。動画内にも表示してください。"}, {"no": 131, "cat": "感染症", "q": "食後に口周りが赤くなります。食物アレルギーですか？", "hook": "結論から言うと、実際に診断していないのでなんともいえませんが、食事中のよだれでかぶれていることもあれば、特定の食材によるアレルギー反応のこともあります。", "point1": "実際に診断していないのでなんともいえませんが、食事中のよだれでかぶれていることもあれば、特定の食材によるアレルギー反応のこともあります。", "point2": "心配な症状があるときは、診察時間内に小児科で食べたものと症状を伝えて今後の離乳食の進め方を相談するといいですよ。", "jusin": "心配な症状があるときは、診察時間内に小児科で食べたものと症状を伝えて今後の離乳食の進め方を相談するといいですよ。 まれに「アナフィラキシーショック」という重篤な症状も起こるので、下記受診の目安を参考にしてください。", "answer": "実際に診断していないのでなんともいえませんが、食事中のよだれでかぶれていることもあれば、特定の食材によるアレルギー反応のこともあります。\n\n心配な症状があるときは、診察時間内に小児科で食べたものと症状を伝えて今後の離乳食の進め方を相談するといいですよ。\n\n食物アレルギーは食後2時間以内、多くは食後30分以内にじんましんや顔や唇のはれ、せきや嘔吐などの症状がみられます。まれに「アナフィラキシーショック」という重篤な症状も起こるので、下記受診の目安を参考にしてください。\n\n🚑 救急車を呼ぶ：ぐったりしている、ゼイゼイしている、せきがずっと続いている、繰り返し嘔吐する、意識がはっきりしない、青ざめているなどの症状が1つでもあり、どんどん具合が悪くなる場合\n\n🏥 診察時間内に受診：食後2時間以内に皮膚のかゆみ・じんましん・赤み、目の充血・腫れ、口・のどのイガイガ感、鼻水・鼻詰まりなどの症状が出て、急速に進まないとき", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：心配な症状があるときは、診察時間内に小児科で食べたものと症状を伝えて今後の離乳食の進め方を相談するといいですよ。 まれに「アナフィラキシーショック」という重篤な症状も起こるので、下記受診の目安を参考にしてください。"}, {"no": 132, "cat": "アレルギー・皮膚", "q": "卵・牛乳・小麦などはアレルギーが怖くて食べさせるのをためらっています。遅らせたほうがいいですか？", "hook": "結論から言うと、自己判断で遅らせるのは逆効果です。", "point1": "自己判断で遅らせるのは逆効果です。食物アレルギーの研究が進み、「食材を適切な時期に食べ始めることで、からだが食べ物を許容して食物アレルギーになりにくい」ということがわかってきました。", "point2": "【三大アレルゲンの食べ始め目安】", "jusin": "外出時は避け、午前中やお昼に試す（いざというとき受診しやすい時間帯に）", "answer": "自己判断で遅らせるのは逆効果です。食物アレルギーの研究が進み、「食材を適切な時期に食べ始めることで、からだが食べ物を許容して食物アレルギーになりにくい」ということがわかってきました。\n\n【三大アレルゲンの食べ始め目安】\n\n卵黄：生後5〜6ヵ月ごろ\n小麦：生後5〜6ヵ月ごろ\n卵白：生後7〜8ヵ月ごろ\n牛乳（調理用）：生後7〜8ヵ月ごろ（飲用として加熱せず飲ませるのは1歳以降）\n\n【新しい食材を食べるときのポイント】\n\n一度に1種類ずつ、少量から試す\n外出時は避け、午前中やお昼に試す（いざというとき受診しやすい時間帯に）\n食材にはしっかり火を通す（卵など、火の通りが不十分だとアレルギー反応が出やすくなる）\n一度試して問題ないようなら、少しずつ増やす\n\n親やきょうだいに食物アレルギーがあった場合でも、遅らせる必要はありません。離乳食は通常通り進めて、症状が出ないかよく観察しましょう。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：外出時は避け、午前中やお昼に試す（いざというとき受診しやすい時間帯に）"}, {"no": 133, "cat": "アレルギー・皮膚", "q": "ゆで卵は大丈夫でしたが、かきたま汁で症状が出ました。なぜですか？", "hook": "結論から言うと、鶏卵と一部の果物・野菜は、加熱によりアレルギー症状が出にくくなる食材があります。", "point1": "鶏卵と一部の果物・野菜は、加熱によりアレルギー症状が出にくくなる食材があります。ゆで卵やりんごジャムで症状が出なくても、かきたま汁や生のりんごで症状が出ることはあります。", "point2": "これは、食材のたんぱく質が加熱により変性して、構造が変化するからだと考えられます。", "jusin": "", "answer": "鶏卵と一部の果物・野菜は、加熱によりアレルギー症状が出にくくなる食材があります。ゆで卵やりんごジャムで症状が出なくても、かきたま汁や生のりんごで症状が出ることはあります。\n\nこれは、食材のたんぱく質が加熱により変性して、構造が変化するからだと考えられます。\n\n初めての食材はしっかり加熱して、少量から食べさせましょう。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 134, "cat": "アレルギー・皮膚", "q": "離乳食を始める前に血液検査などでアレルギーを調べられませんか？", "hook": "結論から言うと、食物アレルギーの有無は血液検査だけでは判断できないので、基本的に離乳食開始前に検査をすることはありません。", "point1": "食物アレルギーの有無は血液検査だけでは判断できないので、基本的に離乳食開始前に検査をすることはありません。", "point2": "血液検査はあくまでも「可能性」を示すだけで、実際は問題なく食べられているのに血液検査では陽性となる（偽陽性）こともあります。そのため、実際に特定の食べ物を食べて症状が出たときに検査をしています。", "jusin": "ただし、離乳食開始前に湿疹の程度が強く、なかなか治らないときなど、赤ちゃん自身に強いアレルギー体質が疑われる場合は、離乳食前に血液検査を行うこともあるので、当てはまるときはかかりつけ医に相談してください。", "answer": "食物アレルギーの有無は血液検査だけでは判断できないので、基本的に離乳食開始前に検査をすることはありません。\n\n血液検査はあくまでも「可能性」を示すだけで、実際は問題なく食べられているのに血液検査では陽性となる（偽陽性）こともあります。そのため、実際に特定の食べ物を食べて症状が出たときに検査をしています。\n\nただし、離乳食開始前に湿疹の程度が強く、なかなか治らないときなど、赤ちゃん自身に強いアレルギー体質が疑われる場合は、離乳食前に血液検査を行うこともあるので、当てはまるときはかかりつけ医に相談してください。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：ただし、離乳食開始前に湿疹の程度が強く、なかなか治らないときなど、赤ちゃん自身に強いアレルギー体質が疑われる場合は、離乳食前に血液検査を行うこともあるので、当てはまるときはかかりつけ医に相談してください。"}, {"no": 135, "cat": "アレルギー・皮膚", "q": "血液検査で大丈夫でも普通に食べると症状が出ます。なぜですか？", "hook": "結論から言うと、食物アレルギーの診断は血液検査（RAST）の結果だけでなされるものではなく、実際に食べた時の症状が最も重要です。", "point1": "食物アレルギーの診断は血液検査（RAST）の結果だけでなされるものではなく、実際に食べた時の症状が最も重要です。", "point2": "検査で陽性の場合、「感作されている（アレルゲンに対して抗体ができている）」ということを意味しますが、症状を起こすほどのレベルでないこともあります。これは人によってレベルが異なります。", "jusin": "毎回症状がある場合にはかかりつり医に相談することをお勧めします。", "answer": "食物アレルギーの診断は血液検査（RAST）の結果だけでなされるものではなく、実際に食べた時の症状が最も重要です。\n\n検査で陽性の場合、「感作されている（アレルゲンに対して抗体ができている）」ということを意味しますが、症状を起こすほどのレベルでないこともあります。これは人によってレベルが異なります。\n\n逆に、血液検査が陽性でも実際は食べられる場合もあります（偽陽性）。毎回症状がある場合にはかかりつり医に相談することをお勧めします。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：毎回症状がある場合にはかかりつり医に相談することをお勧めします。"}, {"no": 136, "cat": "アレルギー・皮膚", "q": "「遅延型アレルギー検査」で隠れたアレルギーがわかると聞きましたが本当ですか？", "hook": "結論から言うと、「遅延型食物アレルギー検査」では食物アレルギーの有無は調べられません。", "point1": "「遅延型食物アレルギー検査」では食物アレルギーの有無は調べられません。", "point2": "保険診療で行う食物アレルギーの検査は「IgE抗体」の値でアレルギーの起こりやすさを判断します。", "jusin": "", "answer": "「遅延型食物アレルギー検査」では食物アレルギーの有無は調べられません。\n\n保険診療で行う食物アレルギーの検査は「IgE抗体」の値でアレルギーの起こりやすさを判断します。一方、自費で行う「遅延型食物アレルギー検査」は「IgG抗体」の値を調べますが、IgGは食物アレルギーのない人にも存在し、陽性だからといって食べられないわけではありません。\n\n検査結果が不要な食品の除去につながり、健康被害を招く恐れがあるとして、日本小児アレルギー学会・日本アレルギー学会は注意喚起をしています。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 137, "cat": "アレルギー・皮膚", "q": "食物アレルギーは治りますか？", "hook": "結論から言うと、鶏卵・牛乳・小麦は、小学校入学までにほとんどの子が食べられるようになります。", "point1": "鶏卵・牛乳・小麦は、小学校入学までにほとんどの子が食べられるようになります。", "point2": "鶏卵：4歳から4歳半までに約50%が、6歳までに80%が食べられるようになる 牛乳：3歳までに50〜60%、6歳までに80%近くが食べられるようになる 小麦：4歳までに30〜60%、8歳までに50〜70%が食べられるようになる", "jusin": "", "answer": "鶏卵・牛乳・小麦は、小学校入学までにほとんどの子が食べられるようになります。\n\n鶏卵：4歳から4歳半までに約50%が、6歳までに80%が食べられるようになる\n牛乳：3歳までに50〜60%、6歳までに80%近くが食べられるようになる\n小麦：4歳までに30〜60%、8歳までに50〜70%が食べられるようになる\n\n一方でナッツ類やピーナッツアレルギーは、成人まで持ち越すことが多いとされています。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 138, "cat": "アレルギー・皮膚", "q": "新生児・乳児消化管アレルギー（乳児食物蛋白誘発胃腸症）とは何ですか？", "hook": "結論から言うと、新生児・乳児消化管アレルギー（乳児食物蛋白誘発胃腸症）は、乳児が牛乳・卵黄などを摂取した後に嘔吐や下痢などの消化器症状が出るアレルギーです。", "point1": "新生児・乳児消化管アレルギー（乳児食物蛋白誘発胃腸症）は、乳児が牛乳・卵黄などを摂取した後に嘔吐や下痢などの消化器症状が出るアレルギーです。", "point2": "通常の食物アレルギーと異なる点：", "jusin": "最近増えているテーマで、おかしいと感じたら小児科を受診してください。", "answer": "新生児・乳児消化管アレルギー（乳児食物蛋白誘発胃腸症）は、乳児が牛乳・卵黄などを摂取した後に嘔吐や下痢などの消化器症状が出るアレルギーです。\n\n通常の食物アレルギーと異なる点：\n\n皮膚症状や呼吸器症状が出ない（消化器症状のみ）\n症状がみられる時間は即時型より遅く2〜4時間後\n血液検査（特異的IgE抗体）は陰性\n1歳から3歳までには改善するといわれている\n\nミルクを始めて数日〜1週間ほどでゲーゲー吐いたり下痢をしたりしたときは、この病気の可能性も考えられます。最近増えているテーマで、おかしいと感じたら小児科を受診してください。", "age": "0〜1歳", "cite": "", "note": "対象年齢・条件：0〜1歳。動画内にも表示してください。\n受診・相談の目安：最近増えているテーマで、おかしいと感じたら小児科を受診してください。"}, {"no": 139, "cat": "アレルギー・皮膚", "q": "授乳中のママの食事制限はしたほうがいいですか？", "hook": "結論から言うと、アレルギー発症予防を目的に妊娠中や授乳中に母親が食物除去することは現在は推奨されていません。", "point1": "アレルギー発症予防を目的に妊娠中や授乳中に母親が食物除去することは現在は推奨されていません。", "point2": "以前は妊娠・授乳中の母親が卵や牛乳などの摂取を避けることで子どもの食物アレルギー発症を予防できるのではと期待された時代もありましたが、現在では母親の食物除去は食物アレルギーやアトピー性皮膚炎の発症予防につながらないことがわかっています。", "jusin": "", "answer": "アレルギー発症予防を目的に妊娠中や授乳中に母親が食物除去することは現在は推奨されていません。\n\n以前は妊娠・授乳中の母親が卵や牛乳などの摂取を避けることで子どもの食物アレルギー発症を予防できるのではと期待された時代もありましたが、現在では母親の食物除去は食物アレルギーやアトピー性皮膚炎の発症予防につながらないことがわかっています。食物除去は母親と子に栄養障害を引き起こすリスクがあります。\n\n母乳を飲んでアレルギー症状が出ることについては、母親の摂取した食品たんぱく質が母乳に移行することは知られていますが、その量は微量で抗原性も低いとされています。最も重いアレルギー症状がすでにあるような赤ちゃんは別として、母親が完全除去を行う必要はないことが多いです。", "age": "全月齢", "cite": "Kramer MS, Kakuma R. Maternal dietary antigen avoidance during pregnancy or lactation. Evid Based Child Health. 2014.", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 140, "cat": "目", "q": "耳掃除はどのくらいの頻度で行えばいいですか？", "hook": "結論から言うと、家庭での耳掃除は不要です。", "point1": "家庭での耳掃除は不要です。入浴後であれば柔らかいタオルでそっと拭う程度で十分です。", "point2": "耳垢には感染防御作用として抗菌活性があることが知られています。耳垢の除去が必要な状況とは、耳垢のために難聴をきたす場合や鼓膜の評価ができない場合です。", "jusin": "", "answer": "家庭での耳掃除は不要です。入浴後であれば柔らかいタオルでそっと拭う程度で十分です。\n\n耳垢には感染防御作用として抗菌活性があることが知られています。耳垢の除去が必要な状況とは、耳垢のために難聴をきたす場合や鼓膜の評価ができない場合です。耳垢が詰まる（耳垢栓塞）と難聴のリスクがあるのは事実ですが、乳幼児の場合、塞がっているように見えても聴こえていることは意外に多いと考えられています※。\n\n実は耳垢栓塞の原因で多いのは耳掃除です。綿棒で外耳道を傷つけたり、耳垢を外耳道の奥に押し込んでしまうことが原因です。耳垢を家庭ごみに例えると、耳掃除をすることは玄関に出た家庭ごみを再び家の中に押し込むようなもので、余計に外に出にくくなってしまいます。\n\n耳掃除は外耳道を傷つけたり、それを目にした子供が自分でやろうとして傷を作ってしまうリスクがあります。また習慣になってしまうと、それをしないと安心しない、眠れない、というケースにつながることもあります。耳掃除をしてあげたいというのは親の愛情の裏返しですが、実はリスクはあっても医学的にはメリットが少ない行為です。どうしても家庭で耳掃除がしたい場合も、2〜3週間に1回くらいの頻度で、ベビー用の細い綿棒を用い、耳の入り口付近を拭って外に出ている耳垢を拭き取る程度に留めてください。耳かきは使わないほうが安全です。\n\n耳たぶのまわり（耳介）は汗やアカがたまりやすいので、入浴時に石けんで洗ってタオルなどで水分をふきとり、保湿剤を塗るといいでしょう。", "age": "全月齢", "cite": "※上出洋介. 【乳幼児健診Q&A】眼科・耳鼻科　耳掃除はしたほうがよいですか. 小児科診療. 2012;75(11):2131-4.", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 141, "cat": "発熱", "q": "受診先は小児科と耳鼻科どちら？", "hook": "結論から言うと、カゼ症状に続いて、急に泣きだす、しきりに耳をさわるときは受診しましょう。", "point1": "カゼ症状に続いて、急に泣きだす、しきりに耳をさわるときは受診しましょう。", "point2": "【中耳炎を疑うサイン】", "jusin": "カゼ症状に続いて、急に泣きだす、しきりに耳をさわるときは受診しましょう。 【受診先の目安】", "answer": "カゼ症状に続いて、急に泣きだす、しきりに耳をさわるときは受診しましょう。\n\n【中耳炎を疑うサイン】\n\n急に泣き出す、むずがる\nしきりに耳をさわる、耳を引っぱる、首を振る\nせき・鼻水をともなわない発熱（原因がわからない発熱のときに考える病気のひとつ）\n\n【受診先の目安】\n\n発熱など耳以外にも症状がある、耳だけの問題かわからない → 小児科へ\n耳をよくさわっている、耳から耳だれが出ている、片方の耳だけニオイがする → 耳鼻科へ\n\n【中耳炎の予防ポイント】\n\n鼻水はこまめに鼻吸い器でとり除く（鼻水がたまると中耳炎になりやすくなる）\n小児用肺炎球菌とヒブの予防接種を受ける\n赤ちゃんと一緒に暮らす大人は禁煙する（受動喫煙は中耳炎のリスクを高める）", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：カゼ症状に続いて、急に泣きだす、しきりに耳をさわるときは受診しましょう。 【受診先の目安】"}, {"no": 142, "cat": "睡眠", "q": "添い乳で中耳炎になると聞きましたが本当ですか？", "hook": "結論から言うと、入浴中に耳に水が入って中耳炎になることはありません。", "point1": "入浴中に耳に水が入って中耳炎になることはありません。外耳と中耳は鼓膜により隔てられていて、外耳から入った水が中耳に入りこむことはありません。", "point2": "ただし、授乳後にゲップをしないまま寝転んでいると、胃の内容物が逆流して耳に入り、中耳炎を引き起こす可能性があります。添い乳で授乳したあとにも、縦抱きでトントンするなどしてゲップさせるといいでしょう。", "jusin": "", "answer": "入浴中に耳に水が入って中耳炎になることはありません。外耳と中耳は鼓膜により隔てられていて、外耳から入った水が中耳に入りこむことはありません。\n\nただし、授乳後にゲップをしないまま寝転んでいると、胃の内容物が逆流して耳に入り、中耳炎を引き起こす可能性があります。添い乳で授乳したあとにも、縦抱きでトントンするなどしてゲップさせるといいでしょう。\n\nまた、授乳後にゲップできずに飲んだミルクを含む胃液が逆流して外耳道に流れ込んで外耳道炎になることもあります。これを防ぐためにも、授乳後のゲップはしっかり行いましょう。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 143, "cat": "発熱", "q": "目やにが多く出ます。小児科と眼科どちらを受診したらいいですか？", "hook": "結論から言うと、目だけに症状があるときは眼科、目以外にも症状があるときは小児科を受診しましょう。", "point1": "目だけに症状があるときは眼科、目以外にも症状があるときは小児科を受診しましょう。", "point2": "【受診先の目安】", "jusin": "目だけに症状があるときは眼科、目以外にも症状があるときは小児科を受診しましょう。 【受診先の目安】 多くは成長とともに自然によくなりますが、気になるときは眼科を受診しましょう。", "answer": "目だけに症状があるときは眼科、目以外にも症状があるときは小児科を受診しましょう。\n\n【受診先の目安】\n\n発熱・発疹など目以外の症状がある → 小児科\n目やに・充血・逆さまつげなど目のみの症状 → 小児眼科・眼科（近隣に小児眼科がないときは事前に電話確認を）\n\n【逆さまつげについて】\n\n赤ちゃんのまつげは逆さまつげになりやすく、1歳未満で46%にみられますが、だんだん低下します。多くは成長とともに自然によくなりますが、気になるときは眼科を受診しましょう。\n\n目に入ったまつげは、時間がたてば涙などで自然に流れ出ます。無理に取ろうとすると指で眼球を傷つけるリスクがあるので避けて。\n\n【目薬の差し方（嫌がる赤ちゃんへ）】\n\n無理に目をこじ開けず、目頭の下を押さえながら目頭のくぼみに1滴たらす\n赤ちゃんが目を開けたときに目薬が自然と全体にいきわたります\n大人の両脚の間で赤ちゃんの頭を固定する\n目薬の容器の先は、まつげや皮膚につけない（細菌・ウイルス汚染防止のため）", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：目だけに症状があるときは眼科、目以外にも症状があるときは小児科を受診しましょう。 【受診先の目安】 多くは成長とともに自然によくなりますが、気になるときは眼科を受診しましょう。"}, {"no": 144, "cat": "目", "q": "テレビやスマホを見すぎると視力に影響しますか？", "hook": "結論から言うと、スマホなどのメディアが視力にどれくらい影響するのかは、まだはっきりとわかっていません。", "point1": "スマホなどのメディアが視力にどれくらい影響するのかは、まだはっきりとわかっていません。", "point2": "視力低下が問題となっているのは小学生以降です。小学生では裸眼視力1.0未満が1979年には17.9%だった一方、2022年度には38%と2倍以上に増えており、特に小学校低学年で顕著とされています。", "jusin": "視力検査は3歳以上で可能で、3歳児健診で実施されるので、気になることがあれば健診時に相談してください。", "answer": "スマホなどのメディアが視力にどれくらい影響するのかは、まだはっきりとわかっていません。\n\n視力低下が問題となっているのは小学生以降です。小学生では裸眼視力1.0未満が1979年には17.9%だった一方、2022年度には38%と2倍以上に増えており、特に小学校低学年で顕著とされています。3歳以下の子どもについては、視力の評価はできず、視覚行動という検査から判断します。視力検査は3歳以上で可能で、3歳児健診で実施されるので、気になることがあれば健診時に相談してください。\n\n近視の原因として一定以上の近さで物を見ることが挙げられています。スマホやタブレットはテレビよりも目に近く、これらを見る時間が増えたことが近視増加の原因とされています。逆に予防として、太陽光に含まれる波長の長い光（バイオレットライト）が近視抑制に効果的とされており[1]、1日2時間以上太陽光を浴びることが推奨されています。外遊びは近視を予防するためにも有効な可能性があります。\n\n○○分までOKという具体的な目安はありませんが、見せっぱなしにするのではなく、ママ・パパと赤ちゃんが一緒に楽しむツールとして、なるべくコミュニケーションをとりながら活用するのが望ましいです。", "age": "全月齢", "cite": "[1] Torii H, Kurihara T, Seko Y, et al. Violet Light Exposure Can Be a Preventive Strategy Against Myopia Progression. EBioMedicine. 2017;15:210-9.\nhttps://www.mext.go.jp/content/20240730-mxt_kenshoku-000031776_01.pdf", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：視力検査は3歳以上で可能で、3歳児健診で実施されるので、気になることがあれば健診時に相談してください。"}, {"no": 145, "cat": "感染症", "q": "よく風邪にかかる子は大人になると身体が丈夫になりますか？", "hook": "結論から言うと、就学前に風邪を繰り返し引くことで、就学後に風邪を引きにくくなるという研究報告はあります。", "point1": "就学前に風邪を繰り返し引くことで、就学後に風邪を引きにくくなるという研究報告はあります。ただし、それ以降（就学後〜大人）については差がなくなるとされています。", "point2": "つまり「就学前に風邪をたくさん引いた子が、成人してからも丈夫になる」という根拠はありません。", "jusin": "", "answer": "就学前に風邪を繰り返し引くことで、就学後に風邪を引きにくくなるという研究報告はあります。ただし、それ以降（就学後〜大人）については差がなくなるとされています。\n\nつまり「就学前に風邪をたくさん引いた子が、成人してからも丈夫になる」という根拠はありません。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 146, "cat": "感染症", "q": "免疫をつけるためには風邪を引かせたほうがいいですか？", "hook": "結論から言うと、わざと風邪を引かせる必要はありません。", "point1": "わざと風邪を引かせる必要はありません。子どもは日常生活の中で自然にさまざまなウイルスに出合い、それぞれとの戦い方を覚えていきます。", "point2": "ただし、感染症の中には予防接種で防げるものがあり、それらは予防接種で防ぐのが最善です。麻疹、ムンプス（おたふくかぜ）、水ぼうそうなどは「かかって免疫をつける」よりも「予防接種で免疫をつける」ほうが安全です。", "jusin": "", "answer": "わざと風邪を引かせる必要はありません。子どもは日常生活の中で自然にさまざまなウイルスに出合い、それぞれとの戦い方を覚えていきます。\n\nただし、感染症の中には予防接種で防げるものがあり、それらは予防接種で防ぐのが最善です。麻疹、ムンプス（おたふくかぜ）、水ぼうそうなどは「かかって免疫をつける」よりも「予防接種で免疫をつける」ほうが安全です。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 147, "cat": "感染症", "q": "ヨーグルトを食べると免疫力がアップしますか？", "hook": "結論から言うと、プロバイオティクス（乳酸菌やビフィズス菌）については、風邪の予防に効果があるという研究はいくつか出ており、「プロバイオティクスはプラセボと比べて急性呼吸器感染…", "point1": "プロバイオティクス（乳酸菌やビフィズス菌）については、風邪の予防に効果があるという研究はいくつか出ており、「プロバイオティクスはプラセボと比べて急性呼吸器感染症の予防に優れている可能性がある」とする2022年…", "point2": "ただし、現時点でどのプロバイオティクスをどれくらい摂取すれば効果があるのかは確立されていません。一方、プロバイオティクスの大きな副作用はないため、月齢に応じて摂取しても問題ありません。", "jusin": "", "answer": "プロバイオティクス（乳酸菌やビフィズス菌）については、風邪の予防に効果があるという研究はいくつか出ており、「プロバイオティクスはプラセボと比べて急性呼吸器感染症の予防に優れている可能性がある」とする2022年のメタアナリシスもあります。\n\nただし、現時点でどのプロバイオティクスをどれくらい摂取すれば効果があるのかは確立されていません。一方、プロバイオティクスの大きな副作用はないため、月齢に応じて摂取しても問題ありません。\n\n「免疫力を上げる」という表現自体が曖昧で、医学的な根拠としては限定的です。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 148, "cat": "感染症", "q": "お風呂上がりに湯冷めするとカゼをひきますか？", "hook": "結論から言うと、現代の家屋環境（浴室が家の中にある）であれば、特に気にしなくていいでしょう。", "point1": "現代の家屋環境（浴室が家の中にある）であれば、特に気にしなくていいでしょう。", "point2": "この「湯冷めするとカゼをひく」という言い伝えは、昔は風呂がなく銭湯に行く文化だったため、風邪を引いているときに外に出て湯冷めをして症状が悪化する場合があったことが由来とされています。", "jusin": "", "answer": "現代の家屋環境（浴室が家の中にある）であれば、特に気にしなくていいでしょう。\n\nこの「湯冷めするとカゼをひく」という言い伝えは、昔は風呂がなく銭湯に行く文化だったため、風邪を引いているときに外に出て湯冷めをして症状が悪化する場合があったことが由来とされています。\n\n入浴の効果（皮膚の清潔、腸管運動を整える、筋肉の緊張をほぐす、よく眠れるようになる）のほうが大きく、風邪をひいているときでも元気があればシャワー・入浴は問題ありません。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 149, "cat": "生活・からだ", "q": "新生児の髪の毛が大量に抜けています。異常ですか？", "hook": "結論から言うと、新生児の髪の毛は通常生後数か月以内に抜け落ちます。", "point1": "新生児の髪の毛は通常生後数か月以内に抜け落ちます。抜け毛は3〜4ヵ月頃にピークを迎えます。これはホルモンの影響によるもので正常な反応です。", "point2": "抜けた部分は永久毛に置き換わっていきます。また、生後3〜6ヵ月の乳児はあおむけにしている間に頭の後ろを枕などにこすることで、枕ハゲができることがよくあります。こちらも自然によくなります。", "jusin": "", "answer": "新生児の髪の毛は通常生後数か月以内に抜け落ちます。抜け毛は3〜4ヵ月頃にピークを迎えます。これはホルモンの影響によるもので正常な反応です。\n\n抜けた部分は永久毛に置き換わっていきます。また、生後3〜6ヵ月の乳児はあおむけにしている間に頭の後ろを枕などにこすることで、枕ハゲができることがよくあります。こちらも自然によくなります。", "age": "0〜1歳", "cite": "", "note": "対象年齢・条件：0〜1歳。動画内にも表示してください。"}, {"no": 150, "cat": "感染症", "q": "玉ねぎを枕元に切って置くと咳が治ると聞きました。本当ですか？", "hook": "結論から言うと、玉ねぎは伝統的に咳の治療に使われてきた歴史がある民間療法ですが、現在の医学的研究では玉ねぎを枕元に置くことで咳が改善するという科学的根拠はありません。", "point1": "玉ねぎは伝統的に咳の治療に使われてきた歴史がある民間療法ですが、現在の医学的研究では玉ねぎを枕元に置くことで咳が改善するという科学的根拠はありません。", "point2": "医学的に咳の改善に効果があるとされているのは、加湿、温かい飲み物、部屋の加湿などです。", "jusin": "", "answer": "玉ねぎは伝統的に咳の治療に使われてきた歴史がある民間療法ですが、現在の医学的研究では玉ねぎを枕元に置くことで咳が改善するという科学的根拠はありません。\n\n医学的に咳の改善に効果があるとされているのは、加湿、温かい飲み物、部屋の加湿などです。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 151, "cat": "アレルギー・皮膚", "q": "プールに入っても大丈夫ですか？", "hook": "結論から言うと、水いぼ（伝染性軟属腫）で注意すべき点は以下の通りです。", "point1": "水いぼ（伝染性軟属腫）で注意すべき点は以下の通りです。", "point2": "意外と治るまで時間がかかる（幅があるが、6ヵ月から2年くらいかかる） 乳児やアトピー性皮膚炎の患者さんにできやすい プールに入ることは可能（ビート板の共有は避ける）", "jusin": "", "answer": "水いぼ（伝染性軟属腫）で注意すべき点は以下の通りです。\n\n意外と治るまで時間がかかる（幅があるが、6ヵ月から2年くらいかかる）\n乳児やアトピー性皮膚炎の患者さんにできやすい\nプールに入ることは可能（ビート板の共有は避ける）", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 152, "cat": "おなか・排便", "q": "ベビーマッサージは発達を促す効果がありますか？", "hook": "結論から言うと、親が子どもを抱きしめ、触れ合い、ケアの中で優しくマッサージすることは、スキンシップを通じて赤ちゃんの安心感を増し、安眠や便秘の解消などにもつながる可能性がある…", "point1": "親が子どもを抱きしめ、触れ合い、ケアの中で優しくマッサージすることは、スキンシップを通じて赤ちゃんの安心感を増し、安眠や便秘の解消などにもつながる可能性があるとして、米国小児科学会のウェブサイトでも詳しく記載…", "point2": "ただし、ベビーマッサージが発達を大幅に促進するという強いエビデンスはまだ限られており、特に早産児では一定の効果が示されています。親子の触れ合いとしては積極的に行ってよいでしょう。", "jusin": "", "answer": "親が子どもを抱きしめ、触れ合い、ケアの中で優しくマッサージすることは、スキンシップを通じて赤ちゃんの安心感を増し、安眠や便秘の解消などにもつながる可能性があるとして、米国小児科学会のウェブサイトでも詳しく記載されています。\n\nただし、ベビーマッサージが発達を大幅に促進するという強いエビデンスはまだ限られており、特に早産児では一定の効果が示されています。親子の触れ合いとしては積極的に行ってよいでしょう。", "age": "0〜1歳", "cite": "", "note": "対象年齢・条件：0〜1歳。動画内にも表示してください。"}, {"no": 153, "cat": "発熱", "q": "効果や接種回数は？", "hook": "結論から言うと、インフルエンザワクチンは接種2週後くらいから抗体ができはじめ、効果を発揮します。", "point1": "インフルエンザワクチンは接種2週後くらいから抗体ができはじめ、効果を発揮します。効果は約5ヵ月間続きます。1〜2月が最も流行しやすい点を考慮すると、10月後半から11月くらいに接種するのが推奨されます。", "point2": "【接種回数】", "jusin": "", "answer": "インフルエンザワクチンは接種2週後くらいから抗体ができはじめ、効果を発揮します。効果は約5ヵ月間続きます。1〜2月が最も流行しやすい点を考慮すると、10月後半から11月くらいに接種するのが推奨されます。\n\n【接種回数】\n\n13歳未満（不活化ワクチン）：2回（2〜4週間あけて）\n13歳以上：1回\n点鼻ワクチン（生ワクチン、2歳〜18歳対象）：1回のみ\n\n【点鼻ワクチンについて】\n\n昨年から2歳から18歳のお子さんを対象に、点鼻ワクチンが接種できるようになりました。針ではなく鼻の穴に噴きつけるスプレータイプで、痛くないので針が苦手な子でも接種できます。また従来のワクチンに比べて感染予防効果が期待できる場合もあります。\n\n【注意点】\n\n卵アレルギーがあっても最近のワクチンは卵白の含有量が極めて微量のため問題なく接種できます\n37.5度以上の発熱がある場合は接種できません\n接種した日は激しい運動を控えましょう。お風呂は通常通り入れます", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 154, "cat": "けが・事故", "q": "学校や保育園でよく流行する感染症の特徴を教えてください（マイコプラズマ・溶連菌・百日咳など）", "hook": "結論から言うと、マイコプラズマ感染症 咳が長く続く（数週間〜数ヵ月）、潜伏期間が長く2〜3週間 抗生剤内服で治療。", "point1": "マイコプラズマ感染症", "point2": "咳が長く続く（数週間〜数ヵ月）、潜伏期間が長く2〜3週間 抗生剤内服で治療。6歳以上に多い", "jusin": "", "answer": "マイコプラズマ感染症\n\n咳が長く続く（数週間〜数ヵ月）、潜伏期間が長く2〜3週間\n抗生剤内服で治療。6歳以上に多い\n\n溶連菌感染症\n\nのどの痛みと発熱。発疹が出ることも。せきはほぼ出ない\n抗菌薬で治療。治療完了まで薬を飲み切ることが重要\n\n百日咳\n\n乳児期に接種した4種混合・5種混合ワクチンの効果が切れる小学生に多い\n夜の咳、数ヵ月続くこともある。熱は出ない\n\n感染症の季節性の変化\n\n以前はインフルエンザは冬、溶連菌は5〜6月という住み分けがありましたが、コロナパンデミック後はそのような季節性があまり目立たなくなり、夏にインフルが流行することもあります。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 155, "cat": "睡眠", "q": "エアコンはつけっぱなしでいいですか？", "hook": "結論から言うと、子どもにとっても快適に過ごせる室温の目安は25〜28℃、湿度60%が基準です。", "point1": "子どもにとっても快適に過ごせる室温の目安は25〜28℃、湿度60%が基準です。", "point2": "高温環境が睡眠に及ぼす影響は成人より乳幼児で大きいため、子どもの睡眠環境では積極的にエアコンを使う必要があります。暑さによる睡眠不足は翌日の熱中症リスクを上げることにもつながります。", "jusin": "", "answer": "子どもにとっても快適に過ごせる室温の目安は25〜28℃、湿度60%が基準です。ただし、エアコンの設定温度を28℃にしても室内が28℃になるとは限らないので、室温計を確認しながら設定温度をさらに下げる必要があるケースもあります。\n\n高温環境が睡眠に及ぼす影響は成人より乳幼児で大きいため、子どもの睡眠環境では積極的にエアコンを使う必要があります。暑さによる睡眠不足は翌日の熱中症リスクを上げることにもつながります。\n\n【エアコンはつけっぱなしでOK】\n\nタイマーで途中で切れるよう設定すると、エアコンが切れた後に室温が急上昇して目が覚めてしまいます。夏の就寝中はつけっぱなしにするのが推奨されます。\n\n【扇風機との併用】\n\n暑い空気は部屋の上に、冷たい空気は部屋の下に溜まりやすいため、扇風機を併用して空気を循環させることで、同じ温度でもより涼しく感じることができます。エアコンの冷気に直接当たり続けると体が過度に冷えるため、風向きを調整して。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 156, "cat": "けが・事故", "q": "子どもが溺れるときはバシャバシャ暴れると思っていましたが、本当はどんな様子ですか？", "hook": "結論から言うと、実際には子どもが溺れるとき、ほとんどは静かに沈んでいきます。", "point1": "実際には子どもが溺れるとき、ほとんどは静かに沈んでいきます。手を挙げたり振ったりする余裕もないためバシャバシャすることもなく、呼吸に精いっぱいなので助けを呼ぶこともありません。", "point2": "日本小児科学会での調査でも、子どもが溺れかけた経験があると答えた保護者のうち、87%が声を出していなかったというデータがあります。", "jusin": "", "answer": "実際には子どもが溺れるとき、ほとんどは静かに沈んでいきます。手を挙げたり振ったりする余裕もないためバシャバシャすることもなく、呼吸に精いっぱいなので助けを呼ぶこともありません。\n\n日本小児科学会での調査でも、子どもが溺れかけた経験があると答えた保護者のうち、87%が声を出していなかったというデータがあります。\n\n【溺水対策】\n\nお風呂での事故が最多：残り湯を溜めない、大人の洗髪時は子どもを湯船から出す\nプール・川：監視員のいる場所で遊ぶ、子どもだけで自然水域に近づかない\nライフジャケットを必ず装着する\n定期的に声をかけ、反応がなければ溺れている可能性を常に考える", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 157, "cat": "けが・事故", "q": "予防するにはどうすればいいですか？", "hook": "結論から言うと、転落事故は3〜4歳に特に多い（全体の約65%が4歳以下）。", "point1": "転落事故は3〜4歳に特に多い（全体の約65%が4歳以下）。理由は、この時期が好奇心が非常に強く探索行動に出やすい一方、危険を理解して自制する能力がまだ育っていないためです。", "point2": "また、小さい子は頭が相対的に重いため転落する時頭が下になりやすく、4歳以下は5歳以上と比べて頭部のケガを3.2倍負いやすいです。", "jusin": "", "answer": "転落事故は3〜4歳に特に多い（全体の約65%が4歳以下）。理由は、この時期が好奇心が非常に強く探索行動に出やすい一方、危険を理解して自制する能力がまだ育っていないためです。\n\nまた、小さい子は頭が相対的に重いため転落する時頭が下になりやすく、4歳以下は5歳以上と比べて頭部のケガを3.2倍負いやすいです。\n\n【予防策】\n\nバルコニーの柵の高さは110cm以上が望ましい\n子どもがアクセスできる窓は10cm以上開かないようにする（補助錠をつける）\n窓や扉へのアクセスを遮断する（足台になるものをそばに置かない）\n4歳以下の子どもを置いて外出しない\nブラインドの紐は子どもの届かないところに", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 158, "cat": "誤飲", "q": "鼻の中に異物を入れたときはどうすればいいですか？", "hook": "結論から言うと、2歳ごろになると、耳や鼻の中に異物を入れてしまうことがあります。", "point1": "2歳ごろになると、耳や鼻の中に異物を入れてしまうことがあります。鼻の異物には綿球やビー玉、BB弾、ビーズ、おもちゃの部品などが多いです。", "point2": "すぐに取れる場合はよいのですが、無理に取ろうとしてかえって奥に押し込むこともあるため、難しい場合には深追いせず耳鼻科で相談するのがよいでしょう。また鼻をかませると逆に吸い込んでしまうこともあるため、鼻をかまないようにしましょう。", "jusin": "すぐに取れる場合はよいのですが、無理に取ろうとしてかえって奥に押し込むこともあるため、難しい場合には深追いせず耳鼻科で相談するのがよいでしょう。 【緊急性の高い状況】ボタン電池、磁石、膨らむビーズなどの場合はすぐに受診が必要です。 なお、子どもが親に叱られると思って黙っていることもあり、片側の鼻の穴から悪臭がする場合、鼻腔異物を疑って耳鼻科へ相談を。", "answer": "2歳ごろになると、耳や鼻の中に異物を入れてしまうことがあります。鼻の異物には綿球やビー玉、BB弾、ビーズ、おもちゃの部品などが多いです。\n\nすぐに取れる場合はよいのですが、無理に取ろうとしてかえって奥に押し込むこともあるため、難しい場合には深追いせず耳鼻科で相談するのがよいでしょう。また鼻をかませると逆に吸い込んでしまうこともあるため、鼻をかまないようにしましょう。\n\n【緊急性の高い状況】ボタン電池、磁石、膨らむビーズなどの場合はすぐに受診が必要です。\n\nなお、子どもが親に叱られると思って黙っていることもあり、片側の鼻の穴から悪臭がする場合、鼻腔異物を疑って耳鼻科へ相談を。受診の際には子どもを責めないように。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：すぐに取れる場合はよいのですが、無理に取ろうとしてかえって奥に押し込むこともあるため、難しい場合には深追いせず耳鼻科で相談するのがよいでしょう。 【緊急性の高い状況】ボタン電池、磁石、膨らむビーズなどの場合はすぐに受診が必要です。 なお、子どもが親に叱られると思って黙っていることもあり、片側の鼻の穴から悪臭がする場合、鼻腔異物を疑って耳鼻科へ相談を。"}, {"no": 159, "cat": "誤飲", "q": "魚の骨が喉に刺さったときはどうすればいいですか？", "hook": "結論から言うと、日本では、喉の異物の95%は魚骨という報告があります。", "point1": "日本では、喉の異物の95%は魚骨という報告があります。特にアジ、ウナギ、サケの順に多いです。", "point2": "小さなお子さんは上手に訴えられないため、魚を食べた後からよだれをダラダラ流したり、飲み込みが難しそうな様子がある、嘔吐などが魚骨異物を疑うきっかけになります。", "jusin": "取れなければ何もせず耳鼻科を受診", "answer": "日本では、喉の異物の95%は魚骨という報告があります。特にアジ、ウナギ、サケの順に多いです。\n\n小さなお子さんは上手に訴えられないため、魚を食べた後からよだれをダラダラ流したり、飲み込みが難しそうな様子がある、嘔吐などが魚骨異物を疑うきっかけになります。\n\n【対応方法】\n\nまずは何度もうがいをする\n取れなければ何もせず耳鼻科を受診\nご飯を丸呑みするのはNG（魚骨がさらに奥に刺さるリスク）\n\n最近は骨が取り除いてある「骨なし魚」の惣菜も増えています。活用するのも一つの方法です。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：取れなければ何もせず耳鼻科を受診"}, {"no": 160, "cat": "けが・事故", "q": "子どもの食事中の窒息事故（リンゴなどの固い食材）はどう防ぎますか？", "hook": "結論から言うと、食べ物が原因の窒息は特に低年齢児に多く、5歳未満が窒息死事故の8割を占めます。", "point1": "食べ物が原因の窒息は特に低年齢児に多く、5歳未満が窒息死事故の8割を占めます。", "point2": "【特にリスクの高い食材】", "jusin": "", "answer": "食べ物が原因の窒息は特に低年齢児に多く、5歳未満が窒息死事故の8割を占めます。乳幼児は気道の直径が約1cmで成人（約2cm）よりも小さく、咳の反射も弱く、臼歯も生えそろっていないため（咀嚼機能は3歳過ぎに完成）リスクが高いです。\n\n【特にリスクの高い食材】\n\n弾力があるもの：こんにゃく、グミ\nつるっとしたもの・丸いもの：ミニトマト、ブドウ、うずら卵\n豆類：ピーナッツ、枝豆\n固い食材：リンゴなどの果物、ニンジン\n粘着性が高い食材：餅、パン（詰め込みすぎ）\n\nリンゴは3歳くらいまでは加熱して与えるのが安全です。固い食材は加熱する・すりおろす・薄切りにするなどの工夫を。\n\n眠そうな状態で食事をさせるのも窒息リスクが上がります。\n\n【窒息時の対処】\n\n急に顔色が悪くなり苦しそうな様子や声を出せなくなった場合は窒息の可能性。蘇生のチャンスは最大9分。背部を叩くか、1歳以上ではハイムリック法（後ろからみぞおちを突き上げる方法）を試み、反応がなければ119番しながら心肺蘇生を行ってください。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 161, "cat": "誤飲", "q": "帰省先や旅行先での誤飲事故のリスクと予防法を教えてください", "hook": "結論から言うと、普段の子育て家庭では注意していても、帰省先や宿泊施設では子どもに対応した対策をしていないことが多く、誤飲などの事故リスクが高まります。", "point1": "普段の子育て家庭では注意していても、帰省先や宿泊施設では子どもに対応した対策をしていないことが多く、誤飲などの事故リスクが高まります。", "point2": "【帰省先での特有リスク】", "jusin": "", "answer": "普段の子育て家庭では注意していても、帰省先や宿泊施設では子どもに対応した対策をしていないことが多く、誤飲などの事故リスクが高まります。\n\n【帰省先での特有リスク】\n\n祖父母の薬：高齢社会の影響で病気を抱える家族が増えています。特に注意が必要なのは糖尿病の薬（血糖降下薬）、血圧の薬（降圧薬）、抗うつ薬など。これらは子どもが誤飲するとたとえ1錠でも命に関わるリスクがある\nボタン電池：リモコンなどのふたを開けて飲み込むケースが多い。テープで固定するなど対策を\n植物・インテリア用品：高吸収性樹脂（カラフルでお菓子のように見える）は水を吸うと大きく膨らみ、飲み込むと腸閉塞を起こす可能性がある\n\n【大人が多い環境での落とし穴】\n\n大人がたくさんいると「誰か見ているだろう」と思って実は誰も見ていないことがあります。帰省中でも監視する保護者の責任を明確にしておくことが大切です。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 162, "cat": "睡眠", "q": "子どもの夏バテはありますか？", "hook": "結論から言うと、子どもも夏バテはあります。", "point1": "子どもも夏バテはあります。症状としては食欲不振、体力低下、活動意欲の減少、睡眠障害、イライラなどで、回復には最大2週間かかることも。", "point2": "【夏バテの原因】", "jusin": "", "answer": "子どもも夏バテはあります。症状としては食欲不振、体力低下、活動意欲の減少、睡眠障害、イライラなどで、回復には最大2週間かかることも。\n\n【夏バテの原因】\n\n睡眠障害：日照時間が長くなるとメラトニンの分泌が遅れ、寝つきが悪くなる。また熱いことで深部体温の低下が妨げられる\n自律神経機能障害：エアコン環境と屋外の急激な温度変化により、頭痛・胃腸症状・疲労感が出やすい\n\n【夏の睡眠環境を整えるポイント】\n\n寝室の温度を快適な温度に下げる\n寝る前のお風呂は温度低めにすると深部体温が下がりやすく寝付きがよい\n夏休み中でも起きる時間を一定にして概日リズムを保つ", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 163, "cat": "夏の健康", "q": "子どもの暑熱馴化（暑さに体を慣らすこと）について教えてください。WBGT（暑さ指数）の目安は？", "hook": "結論から言うと、「学童以前は暑熱馴化を推奨しない」と言われることがありますが、これは医学的根拠のないデマです。", "point1": "「学童以前は暑熱馴化を推奨しない」と言われることがありますが、これは医学的根拠のないデマです。子どもの暑熱馴化は適切に行えば有効で、深部体温の上昇を抑えたり、汗のかきはじめが早くなる等の効果があります。", "point2": "【子どもの暑熱馴化のポイント】", "jusin": "", "answer": "「学童以前は暑熱馴化を推奨しない」と言われることがありますが、これは医学的根拠のないデマです。子どもの暑熱馴化は適切に行えば有効で、深部体温の上昇を抑えたり、汗のかきはじめが早くなる等の効果があります。\n\n【子どもの暑熱馴化のポイント】\n\n期間：10〜14日かけて行う（大人より時間がかかる）\n強度：最初は15〜30分程度の軽い運動から徐々に増やす\n水分補給：のどが渇く前に大人が管理して補給\n猛暑日や湿度が非常に高い日の馴化はしない\n\n【WBGT（暑さ指数）の子ども向け目安】\n\n「子どもはWBGTから5引いた値が目安」という話がありますが、この「−5」という基準には元々医学的根拠がありません。暑さ指数は成人を基準に設定されており、子ども専用の上限は確立されていません。子どもはハイリスク群として早めに活動制限をかける、というのが基本の考え方です。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 164, "cat": "けが・事故", "q": "転倒防止のヘルメット（リュック型）は使ったほうがいいですか？", "hook": "結論から言うと、転倒防止グッズを活用して不安を軽減するのはいいアイデアですが、以下の点に注意が必要です。", "point1": "転倒防止グッズを活用して不安を軽減するのはいいアイデアですが、以下の点に注意が必要です。", "point2": "事故予防のために装着したヘルメットがずれることで、赤ちゃんの鼻や口が覆われて窒息するリスクがある 赤ちゃんは頭皮に湿疹ができやすく、ヘルメットを装着することで頭皮をこまめにチェックしづらくなったり、頭皮が荒れたりすることがある", "jusin": "", "answer": "転倒防止グッズを活用して不安を軽減するのはいいアイデアですが、以下の点に注意が必要です。\n\n事故予防のために装着したヘルメットがずれることで、赤ちゃんの鼻や口が覆われて窒息するリスクがある\n赤ちゃんは頭皮に湿疹ができやすく、ヘルメットを装着することで頭皮をこまめにチェックしづらくなったり、頭皮が荒れたりすることがある\n\nまた、赤ちゃんはからだがやわらかいので、つかまり立ちした状態から後ろに倒れてもまず尻もちをついたあと後ろにひっくり返るため、頭から着地する可能性は低く、骨折や出血などのリスクはそれほど高くありません。\n\n転倒自体を防ぐことは難しいので、転んでも大きなケガにならないように、階段・家具の角などの危険な場所に安全対策をしておくことが大事です。赤ちゃんの活動スペースにフロアマットを敷くのもいいですね。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。"}, {"no": 165, "cat": "誤飲", "q": "旅行先での受診・安全対策のポイントを教えてください", "hook": "結論から言うと、【赤ちゃん連れ旅行の心がまえ】 前日夜・当日朝に発熱していたら日程調整を考える：無理せず延期しましょう 母子健康手帳・健康保険証・おくすり手帳を必ず携帯する：…", "point1": "【赤ちゃん連れ旅行の心がまえ】", "point2": "前日夜・当日朝に発熱していたら日程調整を考える：無理せず延期しましょう 母子健康手帳・健康保険証・おくすり手帳を必ず携帯する：保険証なしで受診すると全額自己負担になります 旅行先で初めての食材は食べさせない：食物アレルギーの症状が出たとき入院が必要…", "jusin": "母子健康手帳・健康保険証・おくすり手帳を必ず携帯する：保険証なしで受診すると全額自己負担になります 【救急セット（例）】 旅先で病気やケガをしたときの受診の目安は普段と同じです。", "answer": "【赤ちゃん連れ旅行の心がまえ】\n\n前日夜・当日朝に発熱していたら日程調整を考える：無理せず延期しましょう\n母子健康手帳・健康保険証・おくすり手帳を必ず携帯する：保険証なしで受診すると全額自己負担になります\n旅行先で初めての食材は食べさせない：食物アレルギーの症状が出たとき入院が必要になる可能性がある\n旅行計画は無理をしない：ゆったりしたスケジュールを\n滞在先に到着したらまず安全チェック！：普段赤ちゃんがいない場所は誤飲などの事故リスクが高い\n\n【救急セット（例）】\n\n解熱剤（アセトアミノフェン）、経口補水液、いつも飲んでいる薬\n保湿剤や処方されている軟膏\n虫よけ、虫刺され用かゆみ止め軟膏、日焼け止め\n\n旅先で病気やケガをしたときの受診の目安は普段と同じです。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：母子健康手帳・健康保険証・おくすり手帳を必ず携帯する：保険証なしで受診すると全額自己負担になります 【救急セット（例）】 旅先で病気やケガをしたときの受診の目安は普段と同じです。"}, {"no": 166, "cat": "おなか・排便", "q": "便秘の治療はどんなことをするのですか？", "hook": "結論から言うと、まずは浣腸や下剤で詰まった便を取り除くことから始めます。", "point1": "まずは浣腸や下剤で詰まった便を取り除くことから始めます。その後、食事療法と薬物療法で1日1回の排便をめざします。", "point2": "便秘は早期の治療開始が解消への近道です。便がたまった状態が続くと、腸が広がり、便意を感じにくくなるため便秘がさらにひどくなります（便秘の悪循環）。", "jusin": "便秘の薬にはさまざまな種類があるので、かかりつけ医と相談して症状に合うものを探していけるといいですね。 ホームケアで解決しようとせず、早めに小児科を受診しましょう。", "answer": "まずは浣腸や下剤で詰まった便を取り除くことから始めます。その後、食事療法と薬物療法で1日1回の排便をめざします。\n\n便秘は早期の治療開始が解消への近道です。便がたまった状態が続くと、腸が広がり、便意を感じにくくなるため便秘がさらにひどくなります（便秘の悪循環）。\n\n便秘の薬にはさまざまな種類があるので、かかりつけ医と相談して症状に合うものを探していけるといいですね。ガンコな便秘の中には先天性の病気が隠れていることもあります。ホームケアで解決しようとせず、早めに小児科を受診しましょう。", "age": "全月齢", "cite": "", "note": "対象年齢・条件：全月齢。動画内にも表示してください。\n受診・相談の目安：便秘の薬にはさまざまな種類があるので、かかりつけ医と相談して症状に合うものを探していけるといいですね。 ホームケアで解決しようとせず、早めに小児科を受診しましょう。"}, {"no": 167, "cat": "誤飲", "q": "「よだれが多い子は健康だ」というのは本当ですか？", "hook": "結論から言うと、よだれには食べ物を飲み込む、細菌の繁殖を防ぐ、虫歯を防ぐなど大切な役割があります。", "point1": "よだれには食べ物を飲み込む、細菌の繁殖を防ぐ、虫歯を防ぐなど大切な役割があります。", "point2": "3歳くらいまではそれほど気にしなくてよいのですが、4歳以上の子どもでよだれが日常的に多い場合は神経や筋肉の発達の問題、扁桃肥大などが原因のことがあります。「よだれが多い＝健康」のバロメーターにはなりません。", "jusin": "", "answer": "よだれには食べ物を飲み込む、細菌の繁殖を防ぐ、虫歯を防ぐなど大切な役割があります。乳児でよだれが多いのは、まだ口や舌の筋肉をうまく制御できず、口をうまく閉じられなかったり、唾液を上手に飲み込めなかったりするためです。よだれは筋肉の発達とともに減少し、通常生後15〜18カ月ごろに落ち着きます。\n\n3歳くらいまではそれほど気にしなくてよいのですが、4歳以上の子どもでよだれが日常的に多い場合は神経や筋肉の発達の問題、扁桃肥大などが原因のことがあります。「よだれが多い＝健康」のバロメーターにはなりません。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 168, "cat": "発達・成長", "q": "「はだしでいると頭がよくなる」というのは本当ですか？", "hook": "結論から言うと、習慣的にはだしで過ごしている子どもの足は靴を履いている子と比べて土踏まずが高く、足の幅が広く、柔軟性も高いという報告があります。", "point1": "習慣的にはだしで過ごしている子どもの足は靴を履いている子と比べて土踏まずが高く、足の幅が広く、柔軟性も高いという報告があります。", "point2": "一方、「はだしだと頭がよくなる」という主張を裏付ける文献はなく、医学的根拠のない説です。", "jusin": "", "answer": "習慣的にはだしで過ごしている子どもの足は靴を履いている子と比べて土踏まずが高く、足の幅が広く、柔軟性も高いという報告があります。また裸足の子どもは活動的であると報告されていますが、その因果関係はまだよく分かっていません（裸足だから活動的なのか、活動的だから裸足なのか不明）。\n\n一方、「はだしだと頭がよくなる」という主張を裏付ける文献はなく、医学的根拠のない説です。なお、不適切な靴の選択は偏平足や外反母趾など子どもの足の発達に悪影響が出る可能性があるため、発育に応じてフィットした靴を選ぶことが重要です（1〜2カ月ごとにサイズ確認を）。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 169, "cat": "食事・栄養", "q": "「ベビーフードは塩分が多いので使ってはいけない」というのは本当ですか？", "hook": "結論から言うと、市販のベビーフードは塩分濃度が低く抑えられていることが示されており、「塩分が多い」という理由で避ける必要はありません。", "point1": "市販のベビーフードは塩分濃度が低く抑えられていることが示されており、「塩分が多い」という理由で避ける必要はありません。", "point2": "ただし、塩分は糖分とともに赤ちゃんが好みやすい性質があり、与えることで過剰摂取の習慣がつきやすく、将来的な高血圧リスクなどが懸念される面もあります。", "jusin": "", "answer": "市販のベビーフードは塩分濃度が低く抑えられていることが示されており、「塩分が多い」という理由で避ける必要はありません。\n\nただし、塩分は糖分とともに赤ちゃんが好みやすい性質があり、与えることで過剰摂取の習慣がつきやすく、将来的な高血圧リスクなどが懸念される面もあります。市販のベビーフードを使うこと自体は問題ありませんが、塩分・糖分が多い大人用食品との混同には注意が必要です。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 170, "cat": "アレルギー・皮膚", "q": "離乳食の卵は卵ボーロから始めていいですか？", "hook": "結論から言うと、卵ボーロは全卵を含むため、家庭で始める方法としてはやや難易度が高く、適切とは言いづらいです。", "point1": "卵ボーロは全卵を含むため、家庭で始める方法としてはやや難易度が高く、適切とは言いづらいです。家庭ではまず卵黄から順に始めていくのがよいでしょう。", "point2": "なお最近は、食物アレルギーが気になる食材を少量から安全に試せるように開発された食品（PAQUPA®など）も販売されており、調理が簡単で少量から試せるメリットがあります。", "jusin": "", "answer": "卵ボーロは全卵を含むため、家庭で始める方法としてはやや難易度が高く、適切とは言いづらいです。家庭ではまず卵黄から順に始めていくのがよいでしょう。\n\nなお最近は、食物アレルギーが気になる食材を少量から安全に試せるように開発された食品（PAQUPA®など）も販売されており、調理が簡単で少量から試せるメリットがあります。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 171, "cat": "アレルギー・皮膚", "q": "花粉症があると果物アレルギーも出るので、事前に果物を避けた方がいいですか？", "hook": "結論から言うと、花粉症と関連して果物アレルギー（花粉ー食物アレルギー症候群）が起こる場合があることは事実です。", "point1": "花粉症と関連して果物アレルギー（花粉ー食物アレルギー症候群）が起こる場合があることは事実です。", "point2": "また、花粉症の低年齢化は指摘されていますが4歳以下は4〜5%程度にとどまります。関連する果物もリンゴ・モモ・キウイ・メロン・バナナなど幅広く、事前に避けることは現実的ではありません。", "jusin": "", "answer": "花粉症と関連して果物アレルギー（花粉ー食物アレルギー症候群）が起こる場合があることは事実です。ただし、花粉症と診断されても必ず症状が出るわけではないので、普通に食べさせてよく、症状が出た時に対応を考えれば十分です。\n\nまた、花粉症の低年齢化は指摘されていますが4歳以下は4〜5%程度にとどまります。関連する果物もリンゴ・モモ・キウイ・メロン・バナナなど幅広く、事前に避けることは現実的ではありません。", "age": "", "cite": "川島佳代子.小児アレルギー性鼻炎の診断と治療.日本小児臨床アレルギー学会誌23（1）,55-58,2025.", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 172, "cat": "アレルギー・皮膚", "q": "そばはいつから食べさせていいですか？", "hook": "結論から言うと、そばについて、ガイドラインで適切な開始年齢は示されていません。", "point1": "そばについて、ガイドラインで適切な開始年齢は示されていません。", "point2": "そのため急いで食べさせる必要はなく、本人が欲しがるようになってから与えるのでよいでしょう。初めて試す際は旅先を避け、少しずつ試してください。", "jusin": "", "answer": "そばについて、ガイドラインで適切な開始年齢は示されていません。早めに摂取した方がよいという根拠は強くない一方、全国調査でそばによるアナフィラキシーショックの発生率は16.5%と高く、重い症状を起こしやすいことが分かっています。\n\nそのため急いで食べさせる必要はなく、本人が欲しがるようになってから与えるのでよいでしょう。初めて試す際は旅先を避け、少しずつ試してください。", "age": "", "cite": "日本アレルギー学会. アナフィラキシーガイドライン2022.", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 173, "cat": "けが・事故", "q": "ビタミンD不足の赤ちゃんが多いと聞きましたが本当ですか？", "hook": "結論から言うと、日本では赤ちゃんのビタミンD不足が指摘されており、半数以上が不足しているという報告があります。", "point1": "日本では赤ちゃんのビタミンD不足が指摘されており、半数以上が不足しているという報告があります。ビタミンDは骨の成長と維持に必要で、不足することで骨の変形や骨折しやすくなるため注意が必要です。", "point2": "ビタミンDは日光を浴びた皮膚表面で作られます。外気浴がしづらい時期は、鮭・イワシ・しらす干し・きのこ類などの食材や、ビタミンD配合のベビー用食品で補給するのも一案です。", "jusin": "", "answer": "日本では赤ちゃんのビタミンD不足が指摘されており、半数以上が不足しているという報告があります。ビタミンDは骨の成長と維持に必要で、不足することで骨の変形や骨折しやすくなるため注意が必要です。\n\nビタミンDは日光を浴びた皮膚表面で作られます。外気浴がしづらい時期は、鮭・イワシ・しらす干し・きのこ類などの食材や、ビタミンD配合のベビー用食品で補給するのも一案です。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 174, "cat": "食事・栄養", "q": "窓際での日向ぼっこでビタミンDは作れますか？", "hook": "結論から言うと、ビタミンDを生成するために必要な紫外線はガラスを通過しないため、窓越しの日向ぼっこではビタミンDを作ることができません。", "point1": "ビタミンDを生成するために必要な紫外線はガラスを通過しないため、窓越しの日向ぼっこではビタミンDを作ることができません。屋外での外気浴がおすすめです。", "point2": "どのくらい日光を浴びればよいかは地域・時間帯によって異なりますが、昼の東京では顔と手に浴びる場合、7月は約10分、12月は約70分が目安とされています。", "jusin": "", "answer": "ビタミンDを生成するために必要な紫外線はガラスを通過しないため、窓越しの日向ぼっこではビタミンDを作ることができません。屋外での外気浴がおすすめです。\n\nどのくらい日光を浴びればよいかは地域・時間帯によって異なりますが、昼の東京では顔と手に浴びる場合、7月は約10分、12月は約70分が目安とされています。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 175, "cat": "食事・栄養", "q": "妊娠中の食事は赤ちゃんの味の好みに影響しますか？", "hook": "結論から言うと、動物実験ではそのような報告もありますが、人の研究では妊娠中の食事が赤ちゃんの味の好みを長期的に決定するというエビデンスはありません。", "point1": "動物実験ではそのような報告もありますが、人の研究では妊娠中の食事が赤ちゃんの味の好みを長期的に決定するというエビデンスはありません。", "point2": "赤ちゃんが将来好きになるように、と思って妊娠中の食事を制限するより、自分自身の栄養バランスを第一に食材を選ぶのがよいでしょう。新しい味への慣れは、無理やり食べさせるのではなく、自然な形で何度もその食材に触れることで育まれます。", "jusin": "", "answer": "動物実験ではそのような報告もありますが、人の研究では妊娠中の食事が赤ちゃんの味の好みを長期的に決定するというエビデンスはありません。\n\n赤ちゃんが将来好きになるように、と思って妊娠中の食事を制限するより、自分自身の栄養バランスを第一に食材を選ぶのがよいでしょう。新しい味への慣れは、無理やり食べさせるのではなく、自然な形で何度もその食材に触れることで育まれます。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 176, "cat": "生活・からだ", "q": "ハチミツは傷の治りを早めますか？", "hook": "結論から言うと、多くの研究を精査した結果、現時点では従来の被覆材の治療と比べてハチミツが傷の治りを促す効果が優れているという十分な証拠はありません。", "point1": "多くの研究を精査した結果、現時点では従来の被覆材の治療と比べてハチミツが傷の治りを促す効果が優れているという十分な証拠はありません。", "point2": "なお、1歳未満の乳児にはボツリヌス症のリスクがあるためハチミツは絶対に与えてはいけません（これは傷の治療とは別の注意点です）。", "jusin": "", "answer": "多くの研究を精査した結果、現時点では従来の被覆材の治療と比べてハチミツが傷の治りを促す効果が優れているという十分な証拠はありません。2度熱傷の治りが多少早まるかもしれないという報告はありますが、それ以外の傷の治療効果は十分に証明されていません。現時点でハチミツを傷の治療に積極的に使うことはお勧めできません。\n\nなお、1歳未満の乳児にはボツリヌス症のリスクがあるためハチミツは絶対に与えてはいけません（これは傷の治療とは別の注意点です）。", "age": "", "cite": "Cochrane systematic review. CD005083. https://www.cochrane.org/ja/evidence/CD005083_honey-topical-treatment-acute-and-chronic-wounds", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 177, "cat": "アレルギー・皮膚", "q": "熱中症の危険なサインは顔色で分かりますか？", "hook": "結論から言うと、顔色は熱中症の危険なサインのひとつです。", "point1": "顔色は熱中症の危険なサインのひとつです。体が熱を逃すために血管を拡張させると皮膚は赤く熱くなります（初期〜進行期）。状態が悪化して脱水になると、血圧が維持できなくなり顔色は蒼白になります。", "point2": "ただし顔色だけで重症度を判断することはできません。熱中症が疑われる場合は、涼しい場所に移動させ、水分補給と体の冷却を優先してください。", "jusin": "", "answer": "顔色は熱中症の危険なサインのひとつです。体が熱を逃すために血管を拡張させると皮膚は赤く熱くなります（初期〜進行期）。状態が悪化して脱水になると、血圧が維持できなくなり顔色は蒼白になります。青白くなる前の、真っ赤な段階で気づくことが大切です。\n\nただし顔色だけで重症度を判断することはできません。熱中症が疑われる場合は、涼しい場所に移動させ、水分補給と体の冷却を優先してください。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 178, "cat": "睡眠", "q": "夜間エアコンをタイマーで途中から切れるように設定してもいいですか？", "hook": "結論から言うと、タイマーで途中から切れる設定はお勧めしません。", "point1": "タイマーで途中から切れる設定はお勧めしません。エアコンが切れた後は室温が急上昇し、赤ちゃんが暑さで目覚めてしまうためです。また暑さによる睡眠不足は翌日の熱中症リスクを上げることにもつながります。", "point2": "夜間はつけっぱなしにするのがよいでしょう。室温の目安は25〜28度が基準ですが、設定温度を28度にしても室内温度が28度になるとは限らないため、室温計を参考に設定を調整してください。", "jusin": "", "answer": "タイマーで途中から切れる設定はお勧めしません。エアコンが切れた後は室温が急上昇し、赤ちゃんが暑さで目覚めてしまうためです。また暑さによる睡眠不足は翌日の熱中症リスクを上げることにもつながります。\n\n夜間はつけっぱなしにするのがよいでしょう。室温の目安は25〜28度が基準ですが、設定温度を28度にしても室内温度が28度になるとは限らないため、室温計を参考に設定を調整してください。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 179, "cat": "夏の健康", "q": "子ども用ハンディファンは熱中症予防に有効ですか？", "hook": "結論から言うと、ハンディファンを含む扇風機の風は汗の蒸発を促しますが、特に35度以上の気温においては冷却効果が限られます。", "point1": "ハンディファンを含む扇風機の風は汗の蒸発を促しますが、特に35度以上の気温においては冷却効果が限られます。乳幼児は発汗能力が低いため、夏の高温環境下でファンを用いるだけでは十分な熱中症予防効果は得られません。", "point2": "最も注意すべきは「ファンをつけているから大丈夫」という安心感から、炎天下に長時間滞在してしまうことです。水分補給・日陰への移動・冷房の活用など、他の対策と組み合わせることが重要です。", "jusin": "", "answer": "ハンディファンを含む扇風機の風は汗の蒸発を促しますが、特に35度以上の気温においては冷却効果が限られます。乳幼児は発汗能力が低いため、夏の高温環境下でファンを用いるだけでは十分な熱中症予防効果は得られません。\n\n最も注意すべきは「ファンをつけているから大丈夫」という安心感から、炎天下に長時間滞在してしまうことです。水分補給・日陰への移動・冷房の活用など、他の対策と組み合わせることが重要です。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 180, "cat": "夏の健康", "q": "暑さ慣れ（暑熱馴化）は子どもにも効果がありますか？", "hook": "結論から言うと、暑熱馴化（暑さ慣れ）には実際に効果があり、深部体温の上昇を抑えたり心拍数が低下して運動が楽になったり、汗をかき始めるタイミングが早くなる等の効果があります。", "point1": "暑熱馴化（暑さ慣れ）には実際に効果があり、深部体温の上昇を抑えたり心拍数が低下して運動が楽になったり、汗をかき始めるタイミングが早くなる等の効果があります。", "point2": "ただし子どもの馴化速度は大人（7〜10日）より遅く（10〜14日）、より多くの回数が必要です。", "jusin": "", "answer": "暑熱馴化（暑さ慣れ）には実際に効果があり、深部体温の上昇を抑えたり心拍数が低下して運動が楽になったり、汗をかき始めるタイミングが早くなる等の効果があります。\n\nただし子どもの馴化速度は大人（7〜10日）より遅く（10〜14日）、より多くの回数が必要です。実施する場合は①10〜14日かけて②最初は15〜30分程度の軽い運動から徐々に強度を上げ③毎日または1日おきに④のどが渇く前に大人が水分補給を管理し⑤猛暑日には行わないことが大切です。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 181, "cat": "感染症", "q": "帰宅後に赤ちゃんの足の裏を洗うと感染症予防になりますか？", "hook": "結論から言うと、感染症予防として足の裏を特別に洗う必要はありません。", "point1": "感染症予防として足の裏を特別に洗う必要はありません。感染症は色々なものを触れた手で鼻や口をさわったり食べ物を口に入れることで広がりやすく、手洗いがこれを防ぐために有効です。", "point2": "感染症予防として足の裏を特別に洗う必要はありません。感染症は色々なものを触れた手で鼻や口をさわったり食べ物を口に入れることで広がりやすく、手洗いがこれを防ぐために有効です。", "jusin": "", "answer": "感染症予防として足の裏を特別に洗う必要はありません。感染症は色々なものを触れた手で鼻や口をさわったり食べ物を口に入れることで広がりやすく、手洗いがこれを防ぐために有効です。足で食べ物を掴んで口に入れるわけではないため、感染症予防のために足の裏をことさら清潔にする根拠はありません。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 182, "cat": "生活・からだ", "q": "子どもの傷は大人より治りやすいですか？", "hook": "結論から言うと、乳幼児は大人と比べて明らかに傷が治りやすいことは事実です。", "point1": "乳幼児は大人と比べて明らかに傷が治りやすいことは事実です。傷の治りに関係する線維芽細胞の移動速度が成人の2倍、コラーゲンの産生能力は4倍とされています。", "point2": "ある研究では12歳以下の小児データを分析し、年齢が1歳上がるごとに傷の治癒不良のリスクが34%増加することが明らかにされています。傷の治りやすさは年齢とともに低下していきます。", "jusin": "", "answer": "乳幼児は大人と比べて明らかに傷が治りやすいことは事実です。傷の治りに関係する線維芽細胞の移動速度が成人の2倍、コラーゲンの産生能力は4倍とされています。また小児の傷の感染率（2.1%）は成人（4.1%）より低いことも分かっています。\n\nある研究では12歳以下の小児データを分析し、年齢が1歳上がるごとに傷の治癒不良のリスクが34%増加することが明らかにされています。傷の治りやすさは年齢とともに低下していきます。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 183, "cat": "睡眠", "q": "子どもは旅行に行くと熱を出しやすいですか？", "hook": "結論から言うと、旅行中は移動が多いため、推奨される睡眠時間（1〜2歳で11〜14時間、3〜5歳で10〜13時間）がとれないことが多くなります。", "point1": "旅行中は移動が多いため、推奨される睡眠時間（1〜2歳で11〜14時間、3〜5歳で10〜13時間）がとれないことが多くなります。", "point2": "帰宅後も数日は感染リスクが続く可能性があるため、旅行後しばらくは体調に注意してあげてください。", "jusin": "", "answer": "旅行中は移動が多いため、推奨される睡眠時間（1〜2歳で11〜14時間、3〜5歳で10〜13時間）がとれないことが多くなります。睡眠と免疫は双方向に結びついており、睡眠不足は感染リスクの上昇につながることが知られています。また時差ぼけによる概日リズムの変化や旅行に伴う疲れ・ストレスも免疫の働きを低下させます。\n\n帰宅後も数日は感染リスクが続く可能性があるため、旅行後しばらくは体調に注意してあげてください。", "age": "", "cite": "", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 184, "cat": "睡眠", "q": "赤ちゃんを布団に下ろすと起きてしまう「背中スイッチ」は本当にありますか？", "hook": "結論から言うと、研究によると、赤ちゃんが眠ってからベッドに置かれる際に覚醒するタイミングは、背中がベッドに着くときではなく、親から体が離れ始めるタイミングだったと報告されてい…", "point1": "研究によると、赤ちゃんが眠ってからベッドに置かれる際に覚醒するタイミングは、背中がベッドに着くときではなく、親から体が離れ始めるタイミングだったと報告されています。", "point2": "また、眠り始めから5分以内にベッドに置くと目覚めやすく、眠ってから座って5〜8分待ってからベッドに置くと起きにくくなることも分かっています。", "jusin": "", "answer": "研究によると、赤ちゃんが眠ってからベッドに置かれる際に覚醒するタイミングは、背中がベッドに着くときではなく、親から体が離れ始めるタイミングだったと報告されています。つまり「背中スイッチ」ではなく「お腹スイッチ」と言えます。\n\nまた、眠り始めから5分以内にベッドに置くと目覚めやすく、眠ってから座って5〜8分待ってからベッドに置くと起きにくくなることも分かっています。", "age": "", "cite": "Ohmura N, et al. Current Biology. 2022. doi:10.1016/j.cub.2022.08.041", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 185, "cat": "けが・事故", "q": "赤ちゃんのモニタリング機器はSIDS予防に有効ですか？", "hook": "結論から言うと、心拍・酸素飽和度を測定するウェアラブルデバイスなどの技術の正確性は研究で示されていますが、実際に事故予防に有効だというエビデンスはまだ不十分です。", "point1": "心拍・酸素飽和度を測定するウェアラブルデバイスなどの技術の正確性は研究で示されていますが、実際に事故予防に有効だというエビデンスはまだ不十分です。", "point2": "また「モニターをつけているから大丈夫」という安心感から親がより遠くに離れてしまい、かえって事故リスクが高まる可能性もあります。基本的なSIDS予防（あおむけ寝・柔らかい寝具を避ける・禁煙）を継続することが重要です。", "jusin": "", "answer": "心拍・酸素飽和度を測定するウェアラブルデバイスなどの技術の正確性は研究で示されていますが、実際に事故予防に有効だというエビデンスはまだ不十分です。特にSIDS予防については大規模な研究でもエビデンスが示されておらず、米国小児科学会もモニタリングはSIDS予防に役立つとはしていません。\n\nまた「モニターをつけているから大丈夫」という安心感から親がより遠くに離れてしまい、かえって事故リスクが高まる可能性もあります。基本的なSIDS予防（あおむけ寝・柔らかい寝具を避ける・禁煙）を継続することが重要です。", "age": "", "cite": "J Safety Res. 2006;37(2):175-85.", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 186, "cat": "発熱", "q": "熱を出すとけいれんすることがあると聞きました。どう対応すればいいですか？", "hook": "結論から言うと、熱が急に上がることで体温の急な変化に脳が対応できず、けいれんすることがあります（熱性けいれん）。", "point1": "熱が急に上がることで体温の急な変化に脳が対応できず、けいれんすることがあります（熱性けいれん）。生後6か月から5歳に起こり、特に1〜2歳に多く、約7〜10人に1人の頻度です。", "point2": "7割は1回限りで、何度か繰り返す子もいますが、5分以内の短時間のけいれんであれば将来の発達に影響するリスクは低いとされています。けいれんで呼吸が止まることはないので落ち着いて見守り、5分以上続く場合や繰り返す場合は救急車を呼んでください。", "jusin": "けいれんで呼吸が止まることはないので落ち着いて見守り、5分以上続く場合や繰り返す場合は救急車を呼んでください。", "answer": "熱が急に上がることで体温の急な変化に脳が対応できず、けいれんすることがあります（熱性けいれん）。生後6か月から5歳に起こり、特に1〜2歳に多く、約7〜10人に1人の頻度です。\n\n7割は1回限りで、何度か繰り返す子もいますが、5分以内の短時間のけいれんであれば将来の発達に影響するリスクは低いとされています。けいれんで呼吸が止まることはないので落ち着いて見守り "hook": "結論から言うと、熱中症の治療では電解質を含む経口補水液（ORS）や薄めたリンゴジュースが推奨されますが、熱中症の予防としては基本的に普通の水やお茶で十分です。", "point1": "熱中症の治療では電解質を含む経口補水液（ORS）や薄めたリンゴジュースが推奨されますが、熱中症の予防としては基本的に普通の水やお茶で十分です。", "point2": "10代の子どもの場合、暑い環境で通常15〜30分ごとに240ml程度の水を補充するのが望ましいとされています。のどが渇く前に定期的に水分をとる習慣をつけることが大切です。", "jusin": "", "answer": "熱中症の治療では電解質を含む経口補水液（ORS）や薄めたリンゴジュースが推奨されますが、熱中症の予防としては基本的に普通の水やお茶で十分です。\n\n10代の子どもの場合、暑い環境で通常15〜30分ごとに240ml程度の水を補充するのが望ましいとされています。のどが渇く前に定期的に水分をとる習慣をつけることが大切です。", "age": "", "cite": "米国小児科学会ウェブサイト. Heat Exposure and Reactions.", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 191, "cat": "食事・栄養", "q": "子どもには甘い飲み物を与えた方が水分をたくさんとれますか？", "hook": "結論から言うと、フレーバー入りの水を与えると無味無臭の水と比べて水分摂取量が増え、グレープフルーツ味では44%増、甘いスポーツ飲料では91%増という研究があります。", "point1": "フレーバー入りの水を与えると無味無臭の水と比べて水分摂取量が増え、グレープフルーツ味では44%増、甘いスポーツ飲料では91%増という研究があります。", "point2": "欧州小児消化器学会は乳児・小児・青少年はソフトドリンクや甘味飲料を控えるべきとしており、5歳以下には基本的に糖分を含む飲み物は推奨されていません。水や麦茶を飲める習慣を作ることが将来の健康につながります。", "jusin": "", "answer": "フレーバー入りの水を与えると無味無臭の水と比べて水分摂取量が増え、グレープフルーツ味では44%増、甘いスポーツ飲料では91%増という研究があります。ただし甘い飲み物は肥満の原因となることが分かっており、牛乳など主要栄養素の摂取量が下がることも指摘されています。\n\n欧州小児消化器学会は乳児・小児・青少年はソフトドリンクや甘味飲料を控えるべきとしており、5歳以下には基本的に糖分を含む飲み物は推奨されていません。水や麦茶を飲める習慣を作ることが将来の健康につながります。", "age": "", "cite": "Fidler Mis N, et al. J Pediatr Gastroenterol Nutr. 2017;65(6):681-96.\nBar-Or O, Wilk B. Int J Sport Nutr. 1996;6(2):93-9.", "note": "本動画は一般的な情報です。個別の診断や治療の代わりにはなりません。"}, {"no": 192, "cat": "食事・栄養", "q": "ゼロカロリー飲料なら子どもに与えても大丈夫ですか？", "hook": "結論から言うと、ゼロカロリー飲料（人工甘味料使用）は砂糖入り飲料と比べて虫歯リスクは下がります。", "point1": "ゼロカロリー飲料（人工甘味料使用）は砂糖入り飲料と比べて虫歯リスクは下がります。", "point2": "世界保健機関（WHO）のガイドラインでも人工甘味料の利用は推奨されておらず、結局は肥満や2型糖尿病などの慢性疾患リスクの軽減につながらないとされています。ゼロカロリーなら問題なしとは言えません。", "jusin": "", "answer": "ゼロカロリー飲料（人工甘味料使用）は砂糖入り飲料と比べて虫歯リスクは下がります。しかし甘いものを好む嗜好が形成されやすく、成人の研究では人工甘味料を摂取した後に甘いスナックを好む傾向が高まることも報告されています。\n\n世界保健機関（WHO）のガイドラインでも人工甘味料の利用は推奨されておらず、結局は肥満や2型糖尿病などの慢性疾患リスクの軽減につながらないとされています。ゼロカロリーなら問題なしとは言えません。", "age": "", "cite": "Suran M. JAMA. 2023;330(1):9-10.", "note": "本動画は一般的な情報です。個別の診断や治療の let activeCat='all', searchText='', allExpanded=false;

function nl2br(t){ return t ? t.replace(/\n/g,'<br>') : ''; }
function hl(t,q){
  if(!q||!t) return t;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return t.replace(re,'<mark>$1</mark>');
}

function renderCards(){
  const grid=document.getElementById('grid');
  const q=searchText.trim().toLowerCase();
  let vis=0;
  grid.innerHTML='';

  qaData.forEach(item=>{
    const matchC=activeCat==='all'||item.cat===activeCat;
    const allText=[item.q,item.answer,item.hook,item.point1,item.point2,item.cite,item.jusin,item.cat,item.age].join(' ').toLowerCase();
    const matchS=!q||allText.includes(q);
    if(!matchC||!matchS) return;
    vis++;

    const color=CAT_COLORS[item.cat]||'#555';
    const sq=hl(item.q,searchText.trim());
    const shook=hl(item.hook,searchText.trim());
    const sanswer=nl2br(hl(item.answer,searchText.trim()));
    const sp1=nl2br(hl(item.point1,searchText.trim()));
    const sp2=nl2br(hl(item.point2,searchText.trim()));
    const scite=nl2br(hl(item.cite,searchText.trim()));
    const sjusin=nl2br(hl(item.jusin,searchText.trim()));

    const openClass=allExpanded?' open':'';
    const btnText=allExpanded?'▲ 回答を閉じる':'▼ 詳しい回答を見る';

    const pointsHtml=(sp1||sp2)?`
      <div class="points-box">
        <h4>💡 要点</h4>
        ${sp1?`<div>${sp1}</div>`:''}
        ${sp2&&sp2!==sp1?`<div style="margin-top:5px">${sp2}</div>`:''}
      </div>`:'';

    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-header">
        <span class="no-badge">No.${item.no}</span>
        <span class="cat-badge" style="background:${color}">${item.cat}</span>
        ${item.age?`<span class="age-badge">👶 ${item.age}</span>`:''}
      </div>
      <div class="card-body">
        <div class="question"><span class="q-pre">Q.</span>${sq}</div>
        ${shook?`<div class="hook-box">${shook}</div>`:''}
        <div class="answer-wrap${openClass}">
          ${sanswer?`<div class="answer-box"><span class="a-pre">A.</span>${sanswer}</div>`:''}
          ${pointsHtml}
          ${sjusin?`<div class="jusin-box">${sjusin}</div>`:''}
          ${scite?`<div class="cite-box">${scite}</div>`:''}
        </div>
        <button class="toggle-btn" onclick="toggleCard(this)">${btnText}</button>
      </div>`;
    grid.appendChild(card);
  });

  if(vis===0) grid.innerHTML=`<div class="no-results">「${searchText}」に一致するQAが見つかりませんでした。</div>`;
  document.getElementById('resultText').textContent=`${vis} 件表示中（全${qaData.length}件）`;
}

function toggleCard(btn){
  const wrap=btn.previousElementSibling;
  const open=wrap.classList.toggle('open');
  btn.textContent=open?'▲ 回答を閉じる':'▼ 詳しい回答を見る';
}

function toggleAll(){
  allExpanded=!allExpanded;
  document.getElementById('expandBtn').textContent=allExpanded?'全て折りたたむ':'全て展開';
  document.querySelectorAll('.answer-wrap').forEach(w=>w.classList.toggle('open',allExpanded));
  document.querySelectorAll('.toggle-btn').forEach(b=>b.textContent=allExpanded?'▲ 回答を閉じる':'▼ 詳しい回答を見る');
}

function setFilter(type,value,btn){
  activeCat=value;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  searchText='';
  renderCards();
}

document.getElementById('searchInput').addEventListener('input',function(){
  searchText=this.value;
  renderCards();
});

renderCards();
</script>
